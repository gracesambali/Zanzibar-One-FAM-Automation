<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">GVC Facility Asset Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1A3566; --navy-light: #2A4A7F; --navy-pale: #E8EDF4;
  --red: #E74C3C; --red-bg: #FDE8E6;
  --green: #27AE60; --green-bg: #E8F8EF;
  --amber: #F39C12; --amber-bg: #FEF5E7;
  --blue: #3B82F6; --blue-bg: #EBF2FF;
  --purple: #8B5CF6; --purple-bg: #F3EEFF;
  --teal: #14B8A6; --teal-bg: #E6FBF8;
  --pink: #EC4899; --pink-bg: #FDEBF3;
  --gold: #D4A843; --gold-bg: #FBF3E3;
  --bg: #F0F2F6; --white: #FFFFFF; --text: #1A1A2E; --muted: #6B7280; --border: #E2E6ED;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
button { font-family: inherit; cursor: pointer; }

.header { background: var(--navy); padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.header-logo { width: 40px; height: 40px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 3px; box-sizing: border-box; }
.header-logo img { width: 100%; height: 100%; object-fit: contain; }
.header-left { display: flex; align-items: center; gap: 14px; }
.header-title { color: #fff; font-weight: 700; font-size: 18px; letter-spacing: 0.5px; }
.header-sub { color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 2px; }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
.live-label { color: rgba(255,255,255,0.7); font-size: 12px; display: flex; align-items: center; gap: 6px; }

.tabs { display: flex; background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; overflow-x: auto; }
.tab-btn { display: flex; align-items: center; gap: 8px; padding: 14px 18px; border: none; background: none; color: var(--muted); border-bottom: 2.5px solid transparent; font-weight: 400; font-size: 13.5px; white-space: nowrap; transition: all 0.2s; }
.tab-btn.active { color: var(--navy); border-bottom-color: var(--navy); font-weight: 600; }
.tab-btn svg { width: 18px; height: 18px; }

.content { padding: 20px 24px; max-width: 1100px; margin: 0 auto; }
.view { display: none; } .view.active { display: block; }

.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
.summary-card { background: var(--white); border-radius: 10px; padding: 16px 18px; border: 1px solid var(--border); }
.summary-val { font-size: 28px; font-weight: 700; }
.summary-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

.filters { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--white); color: var(--text); font-size: 12.5px; font-weight: 400; transition: all 0.2s; }
.filter-btn.active { border-color: var(--navy); background: var(--navy); color: #fff; font-weight: 600; }
.filter-select { padding: 7px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--white); font-size: 12.5px; font-family: inherit; color: var(--text); }
.search-input { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); font-size: 13px; font-family: inherit; flex: 1; min-width: 180px; }
.filter-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }

.asset-list { display: flex; flex-direction: column; gap: 8px; }
.asset-row { display: flex; align-items: center; justify-content: space-between; background: var(--white); border-radius: 10px; padding: 14px 18px; border: 1px solid var(--border); cursor: pointer; text-align: left; width: 100%; transition: box-shadow 0.2s; gap: 10px; }
.asset-row:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.asset-name { font-weight: 600; font-size: 14px; }
.asset-id { font-size: 11px; color: var(--muted); font-family: monospace; }
.asset-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
.asset-class { font-size: 10.5px; color: var(--navy); background: var(--navy-pale); padding: 1px 8px; border-radius: 8px; display: inline-block; margin-top: 4px; }
.badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.badge-good { color: var(--green); background: var(--green-bg); }
.badge-warning { color: var(--amber); background: var(--amber-bg); }
.badge-overdue { color: var(--red); background: var(--red-bg); }
.badge-crit { color: var(--red); background: rgba(0,0,0,0.04); font-weight: 500; }
.badge-high { color: var(--amber); background: rgba(0,0,0,0.04); font-weight: 500; }
.badge-medium { color: var(--muted); background: rgba(0,0,0,0.04); font-weight: 500; }
.result-count { font-size: 12px; color: var(--muted); margin-bottom: 10px; }

.detail-panel { background: var(--white); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
.detail-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; }
.detail-title { font-size: 20px; font-weight: 700; }
.detail-sub { font-size: 13px; color: var(--muted); margin-top: 4px; font-family: monospace; }
.detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
.detail-field { padding: 14px 24px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
.detail-field-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.detail-field-value { font-size: 14px; font-weight: 500; margin-top: 4px; }
.detail-alert { padding: 16px 24px; display: flex; align-items: center; gap: 10px; font-size: 13px; }
.lifecycle-bar-wrap { padding: 16px 24px; }
.lifecycle-bar-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.lifecycle-track { background: #E5E7EB; border-radius: 6px; height: 10px; overflow: hidden; }
.lifecycle-fill { height: 100%; border-radius: 6px; transition: width 0.6s; }
.lifecycle-range { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 4px; }
.back-btn { border: none; background: none; color: var(--navy); font-weight: 600; font-size: 13px; padding: 0; margin-bottom: 16px; cursor: pointer; }

.scenario-intro { background: var(--white); border-radius: 12px; border: 1px solid var(--border); padding: 24px; margin-bottom: 20px; }
.start-btn { background: var(--navy); color: #fff; border: none; border-radius: 10px; padding: 14px 32px; font-size: 15px; font-weight: 600; transition: transform 0.15s; }
.start-btn:hover { transform: scale(1.03); }
.start-center { text-align: center; padding: 40px 0; }
.start-hint { font-size: 12px; color: var(--muted); margin-top: 10px; }

.timeline { display: flex; flex-direction: column; position: relative; }
.timeline-line { position: absolute; left: 19px; top: 0; bottom: 0; width: 2px; background: var(--border); z-index: 0; }
.timeline-step { display: flex; gap: 16px; margin-bottom: 8px; position: relative; z-index: 1; opacity: 0.15; transition: opacity 0.5s, transform 0.5s; transform: translateY(8px); }
.timeline-step.visible { opacity: 1; transform: translateY(0); }
.timeline-dot { width: 16px; height: 16px; border-radius: 50%; border: 3px solid #F0F0F0; background: var(--border); transition: all 0.3s; }
.timeline-step.active .timeline-dot { width: 20px; height: 20px; }
.timeline-card { flex: 1; background: var(--white); border-radius: 10px; padding: 14px 18px; border: 1px solid var(--border); transition: all 0.3s; }

.resolved-box { background: var(--green-bg); border-radius: 12px; padding: 20px 24px; margin-top: 12px; margin-left: 56px; border: 1px solid rgba(39,174,96,0.13); }
.resolved-title { font-weight: 700; font-size: 15px; color: var(--green); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.resolved-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
.resolved-label { font-size: 11px; color: var(--muted); }
.resolved-value { font-weight: 600; font-size: 14px; margin-top: 2px; }
.resolved-compare { margin-top: 14px; padding: 12px 16px; background: var(--white); border-radius: 8px; font-size: 13px; line-height: 1.6; }
.replay-btn { margin-top: 14px; background: var(--navy); color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 13px; font-weight: 600; }

/* Dashboard styles */
.dash-kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(145px, 1fr)); gap: 12px; margin-bottom: 20px; }
.dash-kpi { background: var(--white); border-radius: 10px; padding: 16px; border: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.dash-kpi-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.dash-kpi-val { font-size: 24px; font-weight: 700; line-height: 1.1; }
.dash-kpi-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.dash-panel { background: var(--white); border-radius: 10px; padding: 18px; border: 1px solid var(--border); }
.dash-panel-title { font-size: 13px; font-weight: 700; margin-bottom: 14px; }
.dash-grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 14px; }

.donut-wrap { display: flex; align-items: center; gap: 16px; }
.donut-legend { font-size: 12px; line-height: 2; }
.donut-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }

.bar-chart-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.bar-chart-label { font-size: 11px; min-width: 30px; text-align: right; color: var(--muted); }
.bar-group { display: flex; gap: 3px; flex:1; }
.bar-planned { height: 18px; border-radius: 3px; background: var(--navy); }
.bar-completed { height: 18px; border-radius: 3px; background: var(--green); }
.bar-overdue { height: 18px; border-radius: 3px; background: var(--red); }

.cat-bar-row { display:flex; align-items:center; gap:8px; margin-bottom:9px; }
.cat-bar-label { width:130px; font-size:11.5px; color:var(--muted); text-align:right; flex-shrink:0; }
.cat-bar-track { flex:1; height:18px; background:#EEF1F6; border-radius:4px; overflow:hidden; }
.cat-bar-fill { height:100%; border-radius:4px; display:flex; align-items:center; padding-left:8px; font-size:10.5px; font-weight:600; color:#fff; }

.wo-summary { display: flex; gap: 12px; text-align: center; }
.wo-box { flex: 1; padding: 12px 8px; border-radius: 10px; }
.wo-box-val { font-size: 22px; font-weight: 700; }
.wo-box-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

.alert-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.alert-item:last-child { border-bottom: none; }
.alert-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; }
.alert-time { font-size: 10px; color: var(--muted); white-space: nowrap; margin-left: auto; flex-shrink: 0; }

.maint-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.maint-item:last-child { border-bottom: none; }
.maint-icon { margin-right: 8px; }

.doc-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.doc-item:last-child { border-bottom: none; }
.doc-icon { width: 28px; height: 28px; border-radius: 6px; background: var(--navy-pale); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

.view-link { font-size: 12px; color: var(--navy); font-weight: 600; margin-top: 10px; display: inline-block; }

.footer { text-align: center; padding: 24px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); margin-top: 40px; }

/* Systems tab */
.sys-card { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:14px; }
.sys-card-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; flex-wrap:wrap; gap:8px; }
.sys-card-name { font-size:15px; font-weight:700; color:var(--navy); }
.sys-card-count { font-size:11px; font-weight:600; padding:4px 12px; border-radius:12px; background:var(--navy-pale); color:var(--navy); }
.sys-card-desc { font-size:13px; color:var(--muted); line-height:1.6; }

/* Maintenance tab */
.freq-row { display:flex; align-items:center; gap:10px; margin-bottom:9px; }
.freq-label { width:150px; font-size:12px; color:var(--muted); text-align:right; flex-shrink:0; }
.freq-track { flex:1; height:20px; background:#EEF1F6; border-radius:4px; overflow:hidden; }
.freq-fill { height:100%; border-radius:4px; display:flex; align-items:center; padding-left:8px; font-size:11px; font-weight:600; color:#fff; }

.wo-flow { display:flex; flex-direction:column; gap:0; }
.wo-flow-step { display:flex; gap:14px; position:relative; padding-bottom:22px; }
.wo-flow-step::before { content:''; position:absolute; left:15px; top:32px; bottom:0; width:2px; background:var(--border); }
.wo-flow-step:last-child::before { display:none; }
.wo-flow-num { width:32px; height:32px; border-radius:50%; background:var(--navy); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex-shrink:0; }
.wo-flow-body { flex:1; padding-top:2px; }
.wo-flow-title { font-weight:600; font-size:13.5px; }
.wo-flow-desc { font-size:12.5px; color:var(--muted); margin-top:3px; line-height:1.5; }
.wo-flow-channel { display:inline-block; font-size:10px; font-weight:600; padding:2px 8px; border-radius:8px; margin-top:6px; margin-right:6px; }
.chan-sms { background:var(--blue-bg); color:var(--blue); }
.chan-email { background:var(--purple-bg); color:var(--purple); }
.chan-system { background:var(--green-bg); color:var(--green); }

/* Level view */
.level-row { display:flex; justify-content:space-between; align-items:flex-start; padding:12px 0; border-bottom:1px solid var(--border); gap:10px; }
.level-row:last-child { border-bottom:none; }
.level-name { font-size:13.5px; font-weight:700; color:var(--navy); }
.level-detail { font-size:11.5px; color:var(--muted); margin-top:2px; }
.level-count { font-size:12px; color:var(--muted); white-space:nowrap; font-weight:600; }

@media (max-width: 700px) {
  .dash-grid { grid-template-columns: 1fr; }
  .dash-grid-4 { grid-template-columns: 1fr; }
  .dash-kpi-grid { grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); }
}
</style>
<script src="https://unpkg.com/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo"><img src="/logo.png" alt="GVC"></div>
    <div>
      <div class="header-title">Facility Asset Manager</div>
      <div class="header-sub" id="header-subtitle">Prepared for [Client Name] — [Building Name] · MEP Systems</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <div class="live-label"><div class="live-dot"></div> Live Monitoring</div>
    <button onclick="logout()" style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">Log Out</button>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Dashboard
  </button>
  <button class="tab-btn" data-tab="assets" onclick="switchTab('assets')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v3"/></svg>
    Asset Register
  </button>
  <button class="tab-btn" data-tab="systems" onclick="switchTab('systems')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 10v6m11-11h-6M7 12H1m17.36-6.36l-4.24 4.24M9.88 14.12l-4.24 4.24m0-13.72l4.24 4.24m4.24 4.24l4.24 4.24"/></svg>
    Systems
  </button>
  <button class="tab-btn" data-tab="maintenance" onclick="switchTab('maintenance')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
    Maintenance
  </button>
  <button class="tab-btn" data-tab="levelview" onclick="switchTab('levelview')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
    Level View
  </button>
  <button class="tab-btn" data-tab="workorders" onclick="switchTab('workorders')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    Work Orders
  </button>
</div>

<div id="loading-screen" style="text-align:center;padding:100px 20px;">
  <div style="width:36px;height:36px;border:3px solid #E2E6ED;border-top-color:#1A3566;border-radius:50%;margin:0 auto 16px;animation:spin 0.8s linear infinite;"></div>
  <div style="font-size:14px;color:#6B7280;">Loading live asset data…</div>
</div>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>

<div class="content" style="display:none;">
  <div id="view-dashboard" class="view active"></div>
  <div id="view-assets" class="view"></div>
  <div id="view-systems" class="view"></div>
  <div id="view-maintenance" class="view"></div>
  <div id="view-levelview" class="view"></div>
  <div id="view-workorders" class="view"></div>
</div>

<div class="footer">Gracing Ventures · BIM Training – Coordination – Information Management · Tanzania</div>

<script>
// ============================================================
// BRANDING CONFIG — edit these 4 lines for each client deployment.
// Nothing else in this file needs to change per client.
// ============================================================
const CLIENT_CONFIG = {
  clientName: "Sali International Hospital",
  buildingLabel: "[Floor/Zone — confirm after site survey]", // fill in once the pilot floor/zone is agreed (Field 1 of the scope PDF)
  accentColor: "#1A3566",
  pageTitle: "GVC Facility Asset Manager"
};

// Apply config to the page (header text, browser tab title)
document.title = CLIENT_CONFIG.pageTitle + " — " + CLIENT_CONFIG.clientName;
document.addEventListener('DOMContentLoaded', () => {
  const sub = document.getElementById('header-subtitle');
  if (sub) sub.textContent = `Prepared for ${CLIENT_CONFIG.clientName} — ${CLIENT_CONFIG.buildingLabel} · MEP Systems`;
});

let assets = []; // populated live from Airtable via /api/get-assets

const levelDefs = [
  { id:"B2", label:"Basement 2 — Plant & Parking", count:5 },
  { id:"B1", label:"Basement 1 — Plant, Substation & Parking", count:9 },
  { id:"L1", label:"Level 1 — Ground Floor / Lobby & Retail", count:10 },
  { id:"L2", label:"Level 2 — Retail", count:4 },
  { id:"L3", label:"Level 3 — Retail", count:4 },
  { id:"L4", label:"Level 4 — Office", count:4 },
  { id:"L5", label:"Level 5 — Office", count:4 },
  { id:"L6", label:"Level 6 — Office", count:4 },
  { id:"L7", label:"Level 7 — Office", count:4 },
  { id:"L8", label:"Level 8 — Mechanical Floor", count:3 },
  { id:"L9", label:"Level 9 — Office", count:4 },
  { id:"L10", label:"Level 10 — Office", count:4 },
  { id:"L11", label:"Level 11 — Office", count:4 },
  { id:"L12", label:"Level 12 — Office", count:4 },
  { id:"L13", label:"Level 13 — Office", count:4 },
  { id:"L14", label:"Level 14 — Office", count:4 },
  { id:"L15", label:"Level 15 — Rooftop Plant", count:5 }
];

const systemDefs = [
  { name:"HVAC", desc:"Chillers, cooling towers, air handling units and fan coil units maintaining comfort conditions across all occupied floors.", color:"var(--navy)" },
  { name:"Fire Protection", desc:"Electric and diesel fire pumps, jockey pump, and wet-riser distribution ensuring code-compliant fire suppression capacity.", color:"var(--red)" },
  { name:"Electrical", desc:"HV/LV transformers, main switchgear, standby generator and UPS supporting building power resilience.", color:"var(--amber)" },
  { name:"Vertical Transport", desc:"Passenger and freight lifts moving people and goods between all 15 levels and both basements.", color:"var(--blue)" },
  { name:"Plumbing", desc:"Domestic water boosting and basement drainage/sump systems.", color:"var(--purple)" },

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab===tab));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  if(tab==='dashboard') renderDashboard();
  if(tab==='assets') renderAssets();
  if(tab==='systems') renderSystems();
  if(tab==='maintenance') renderMaintenance();
  if(tab==='levelview') renderLevelView();
  if(tab==='workorders') renderWorkOrders();
}

function drawDonut(canvas, segments, size) {
  const ctx = canvas.getContext('2d');
  const cx = size/2, cy = size/2, r = size*0.38, inner = size*0.26;
  let start = -Math.PI/2;
  const total = segments.reduce((s,seg)=>s+seg.value,0);
  segments.forEach(seg => {
    const angle = (seg.value/total)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,start+angle);
    ctx.closePath(); ctx.fillStyle = seg.color; ctx.fill();
    start += angle;
  });
  ctx.beginPath(); ctx.arc(cx,cy,inner,0,Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.fill();
}

function getFilteredAssets() {
  return assets.filter(a => {
    if(currentSystemFilter!=="All" && a.system!==currentSystemFilter) return false;
    if(currentLevelFilter!=="All" && a.level!==currentLevelFilter) return false;
    if(currentStatusFilter!=="All" && a.status!==currentStatusFilter) return false;
    if(currentSearch) {
      const q = currentSearch.toLowerCase();
      const hay = (a.id+" "+a.name+" "+a.location+" "+a.manufacturer+" "+a.model+" "+a.klass).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

function showDetail(idx) {
  const a = assets[idx];
  const age = 2026 - parseInt(a.installDate.split("-")[0]);
  const pct = Math.min((age/a.lifespan)*100, 100);
  const eol = parseInt(a.installDate.split("-")[0]) + a.lifespan;
  let html = `<button class="back-btn" onclick="renderAssets()">← Back to Asset Register</button>
  <div class="detail-panel"><div class="detail-header"><div><div class="detail-title">${a.name}</div><div class="detail-sub">${a.id} · ${a.system} · ${a.klass}</div></div>

  <div class="detail-grid">`;
  [["Level",levelDefs.find(l=>l.id===a.level).label],["Location",a.location],["Manufacturer",a.manufacturer],["Model",a.model],["Install Date",a.installDate],["Expected Lifespan",a.lifespan+" years"],["Asset Age",age+" years"],["Last Service",a.lastService],["Next Service Due",a.nextService]].forEach(([l,v])=>{

let lastWorkOrders = [];

async function renderWorkOrders() {
  const container = document.getElementById('view-workorders');
  container.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--muted)">Loading work orders…</div>';

  try {
    const resp = await fetch('/api/work-orders');
    if (resp.status === 401) { window.location.href = '/login.html'; return; }
    if (!resp.ok) throw new Error('Failed to load work orders (' + resp.status + ')');
    const data = await resp.json();
    const orders = data.workOrders || [];
    lastWorkOrders = orders; // cache for generateCertificate() to reference

    const open = orders.filter(o => o.status === 'Open').length;
    const inProgress = orders.filter(o => o.status === 'In Progress').length;
    const completed = orders.filter(o => o.status === 'Completed').length;

    let html = `<div class="summary-grid">
      <div class="summary-card"><div class="summary-val" style="color:var(--navy)">${orders.length}</div><div class="summary-label">Total Work Orders</div></div>
      <div class="summary-card"><div class="summary-val" style="color:var(--red)">${open}</div><div class="summary-label">Open</div></div>
      <div class="summary-card"><div class="summary-val" style="color:var(--amber)">${inProgress}</div><div class="summary-label">In Progress</div></div>
      <div class="summary-card"><div class="summary-val" style="color:var(--green)">${completed}</div><div class="summary-label">Completed</div></div>
    </div>`;

    if (orders.length === 0) {
      html += `<div style="text-align:center;padding:40px 20px;color:var(--muted);font-style:italic">No work orders yet — these are created automatically the moment a real maintenance alert fires.</div>`;
    } else {
      html += `<div class="asset-list">`;
      orders.forEach(o => {
        html += `<div class="asset-row" style="cursor:default">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="asset-name">${o.assetName}</span><span class="asset-id">${o.woId}</span></div>
            <div class="asset-meta">${o.location} · ${o.system} · Created ${new Date(o.created).toLocaleString()}</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
            <span class="badge ${critBadge(o.urgency === 'OVERDUE' || o.urgency === 'URGENT' ? 'Critical' : 'Medium')}">${o.urgency}</span>
            ${o.status === 'Completed' ? `<button onclick="generateCertificate('${o.id}')" style="padding:6px 12px;font-size:11px;font-weight:600;border:1px solid var(--green);border-radius:8px;background:#fff;color:var(--green);cursor:pointer">📄 Certificate</button>` : ''}
            <select onchange="updateWorkOrderStatus('${o.id}', this.value)" style="padding:6px 10px;border-radius:8px;border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--navy)">
              <option value="Open" ${o.status==='Open'?'selected':''}>Open</option>
              <option value="In Progress" ${o.status==='In Progress'?'selected':''}>In Progress</option>
              <option value="Completed" ${o.status==='Completed'?'selected':''}>Completed</option>
            </select>
          </div>
        </div>`;
      });
      html += `</div>`;
    }

    container.innerHTML = html;
  } catch (err) {
    container.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--red)">Could not load work orders: ' + err.message + '</div>';
  }
}

async function updateWorkOrderStatus(recordId, status) {
  try {
    const resp = await fetch('/api/work-orders', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ recordId, status }),
    });
    if (!resp.ok) throw new Error('Update failed');
    renderWorkOrders(); // refresh the summary counts
  } catch (err) {
    alert('Could not update work order: ' + err.message);
  }
}

// Shared utility: builds a real .xlsx file (bold header row, correct
// unicode handling — no more broken "—" characters) from any array of
// asset objects. Used by both the full register download and the
// single-asset download button.
function exportAssetsXLSX(assetList, filenameSuffix) {
  const headers = ["Asset ID","Name","System","Class","Level","Location","Manufacturer","Model","Install Date","Status","Criticality","Last Service","Next Service Due"];
  const rows = assetList.map(a => [a.id, a.name, a.system, a.klass, a.level, a.location, a.manufacturer, a.model, a.installDate, a.status, a.criticality, a.lastService, a.nextService]);

  const worksheet = XLSX.utils.aoa_to_sheet([headers, ...rows]);

  // Bold the header row
  const headerRange = XLSX.utils.decode_range(worksheet['!ref']);
  for (let col = headerRange.s.c; col <= headerRange.e.c; col++) {
    const cellRef = XLSX.utils.encode_cell({ r: 0, c: col });
    if (!worksheet[cellRef]) continue;
    worksheet[cellRef].s = { font: { bold: true } };
  }

  // Reasonable column widths so it's readable on open, not cramped
  worksheet['!cols'] = headers.map(h => ({ wch: Math.max(h.length + 2, 14) }));

  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Asset Register");

  const filename = `${CLIENT_CONFIG.clientName.replace(/\s+/g,'_')}_${filenameSuffix}_${new Date().toISOString().split('T')[0]}.xlsx`;
  XLSX.writeFile(workbook, filename, { cellStyles: true });
}

function exportAssetRegisterCSV() {
  exportAssetsXLSX(assets, "Asset_Register");
}

function exportSingleAssetXLSX(assetId) {
  const asset = assets.find(a => a.id === assetId);
  if (!asset) { alert("Asset not found."); return; }
  exportAssetsXLSX([asset], `Asset_${assetId}`);
}

      table { width:100%; border-collapse:collapse; font-size:12px; }
      th { background:#1A3566; color:#fff; text-align:left; padding:8px; }
      td { padding:7px 8px; border-bottom:1px solid #E2E6ED; }
      tr:nth-child(even) { background:#F8FAFC; }
      .download-btn { background:#1A3566; color:#fff; border:none; border-radius:8px; padding:10px 20px; font-size:13px; font-weight:600; cursor:pointer; margin-bottom:20px; }
      @media print { .download-btn { display:none; } }
    </style></head>
    <body>
      <button class="download-btn" onclick="window.print()">↓ Download as PDF</button>
      <h1>Maintenance Plan — Next ${windowDays} Days</h1>
      <div class="sub">Prepared for ${CLIENT_CONFIG.clientName} — ${CLIENT_CONFIG.buildingLabel} · Generated ${new Date().toISOString().split('T')[0]} · Window: through ${cutoff.toISOString().split('T')[0]} · ${filtered.length} asset${filtered.length!==1?'s':''} due</div>
      ${filtered.length === 0 ? '<div class="empty">Nothing due for service within this window.</div>' : `
      <table><thead><tr><th>Asset ID</th><th>Name</th><th>System</th><th>Location</th><th>Criticality</th><th>Status</th><th>Next Service Due</th></tr></thead>
      <tbody>${rows}</tbody></table>`}
    </body></html>
  `);
  win.document.close();
  win.focus();
}

async function generateMonthlyReport() {
  try {
    const resp = await fetch('/api/monthly-report');
    if (!resp.ok) throw new Error('Failed to load report data (' + resp.status + ')');
    const data = await resp.json();

    const win = window.open('', '_blank');
    const urgencyRows = Object.entries(data.byUrgency)
      .map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('');
    const eventRows = data.events
      .map(e => `<tr><td>${new Date(e.timestamp).toLocaleString()}</td><td>${e.assetId}</td><td>${e.assetName}</td><td>${e.system}</td><td>${e.urgency}</td><td>${e.channel}</td></tr>`)
      .join('');

    win.document.write(`
      <html><head><title>Monthly Report — ${CLIENT_CONFIG.clientName}</title>
      <style>
        body { font-family: Arial, sans-serif; padding: 30px; color:#1A1A2E; }
        h1 { color:#1A3566; font-size:20px; }
        h2 { color:#1A3566; font-size:14px; margin-top:24px; margin-bottom:10px; }
        .sub { color:#6B7280; font-size:12px; margin-bottom:20px; }
        .kpi { display:inline-block; background:#F8FAFC; border:1px solid #E2E6ED; border-radius:8px; padding:12px 20px; margin-right:12px; margin-bottom:16px; }
        .kpi-val { font-size:22px; font-weight:700; color:#1A3566; }
        .kpi-label { font-size:11px; color:#6B7280; }
        table { width:100%; border-collapse:collapse; font-size:12px; margin-bottom:20px; }
        th { background:#1A3566; color:#fff; text-align:left; padding:8px; }
        td { padding:7px 8px; border-bottom:1px solid #E2E6ED; }
        tr:nth-child(even) { background:#F8FAFC; }
        .empty { color:#6B7280; font-style:italic; padding:12px 0; }
        .download-btn { background:#1A3566; color:#fff; border:none; border-radius:8px; padding:10px 20px; font-size:13px; font-weight:600; cursor:pointer; margin-bottom:20px; }
        @media print { .download-btn { display:none; } }
      </style></head>
      <body>
        <button class="download-btn" onclick="window.print()">↓ Download as PDF</button>
        <h1>Monthly Report — Last 30 Days</h1>
        <div class="sub">Prepared for ${CLIENT_CONFIG.clientName} — ${CLIENT_CONFIG.buildingLabel} · ${new Date(data.periodStart).toLocaleDateString()} to ${new Date(data.periodEnd).toLocaleDateString()}</div>

        <div class="kpi"><div class="kpi-val">${data.totalAlerts}</div><div class="kpi-label">Total Alerts Sent</div></div>

        ${data.totalAlerts === 0 ? '<div class="empty">No alerts have been sent yet in this period. This report will populate as the system runs.</div>' : `
        <h2>By Urgency</h2>
        <table><thead><tr><th>Urgency</th><th>Count</th></tr></thead><tbody>${urgencyRows}</tbody></table>

        <h2>Full Alert History</h2>
        <table><thead><tr><th>Date/Time</th><th>Asset ID</th><th>Asset Name</th><th>System</th><th>Urgency</th><th>Channel</th></tr></thead><tbody>${eventRows}</tbody></table>
        `}
      </body></html>
    `);
    win.document.close();
    win.focus();
  } catch (err) {
    alert('Could not generate report: ' + err.message);
  }
}

function openAddAssetForm() {
  const overlay = document.createElement('div');
  overlay.id = 'addAssetOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:14px;max-width:440px;width:100%;padding:28px;max-height:90vh;overflow-y:auto">
      <h3 style="font-size:16px;color:var(--navy);margin-bottom:4px">Add New Asset</h3>
      <div style="font-size:12px;color:var(--muted);margin-bottom:18px">Onboarding a replacement? Decommission the old unit first from its detail view, then add the new one here.</div>
      <div id="addAssetError" style="display:none;background:var(--red-bg);color:var(--red);padding:10px 12px;border-radius:8px;font-size:12.5px;margin-bottom:12px"></div>
      <label style="font-size:11px;font-weight:600;color:var(--navy);display:block;margin-bottom:4px">Asset ID *</label>
      <input id="na_id" placeholder="e.g. FCU-081" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;margin-bottom:10px">
      <label style="font-size:11px;font-weight:600;color:var(--navy);display:block;margin-bottom:4px">Name *</label>
      <input id="na_name" placeholder="e.g. Fan Coil Unit" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;margin-bottom:10px">
      <label style="font-size:11px;font-weight:600;color:var(--navy);display:block;margin-bottom:4px">System</label>
      <select id="na_system" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;margin-bottom:10px">
        ${systemDefs.map(s=>`<option value="${s.name}">${s.name}</option>`).join('')}
      </select>
      <label style="font-size:11px;font-weight:600;color:var(--navy);display:block;margin-bottom:4px">Location</label>
      <input id="na_location" placeholder="e.g. Level 4 — Ward Corridor" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;margin-bottom:10px">
      <label style="font-size:11px;font-weight:600;color:var(--navy);display:block;margin-bottom:4px">Manufacturer</label>
      <input id="na_manufacturer" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;margin-bottom:10px">
      <label style="font-size:11px;font-weight:600;color:var(--navy);display:block;margin-bottom:4px">Model</label>
      <input id="na_model" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;margin-bottom:10px">
      <label style="font-size:11px;font-weight:600;color:var(--navy);display:block;margin-bottom:4px">Criticality</label>
      <select id="na_criticality" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;margin-bottom:16px">
        <option>Low</option><option>Medium</option><option>High</option><option>Critical</option>
      </select>
      <div style="display:flex;gap:8px">
        <button onclick="closeAddAssetForm()" style="flex:1;padding:11px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text);font-weight:600;cursor:pointer">Cancel</button>
        <button id="na_submit" onclick="submitNewAsset()" style="flex:1;padding:11px;border:none;border-radius:8px;background:var(--navy);color:#fff;font-weight:600;cursor:pointer">Add Asset</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

function closeAddAssetForm() {
  const overlay = document.getElementById('addAssetOverlay');
  if (overlay) overlay.remove();
}

async function submitNewAsset() {
  const id = document.getElementById('na_id').value.trim();
  const name = document.getElementById('na_name').value.trim();
  const errorBox = document.getElementById('addAssetError');
  const btn = document.getElementById('na_submit');

  if (!id || !name) {
    errorBox.textContent = 'Asset ID and Name are required.';
    errorBox.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Adding…';
  errorBox.style.display = 'none';

  try {
    const resp = await fetch('/api/manage-asset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        id, name,
        system: document.getElementById('na_system').value,
        location: document.getElementById('na_location').value.trim(),
        manufacturer: document.getElementById('na_manufacturer').value.trim(),
        model: document.getElementById('na_model').value.trim(),
        criticality: document.getElementById('na_criticality').value,
      }),
    });
    const data = await resp.json();

    if (resp.status === 409) {
      // Duplicate Asset ID — this is the real enforcement in action
      errorBox.textContent = data.error;
      errorBox.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Add Asset';
      return;
    }
    if (!resp.ok) throw new Error(data.error || 'Failed to add asset');

    closeAddAssetForm();
    loadAssetsAndInit(); // refresh live data so the new asset appears immediately
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Add Asset';
  }
}

async function decommissionAsset(recordId, assetName) {
  const reason = prompt(`Decommissioning "${assetName}". Optional reason (e.g. "replaced before end of lifecycle"):`);
  if (reason === null) return; // cancelled

  try {
    const resp = await fetch('/api/manage-asset', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ recordId, reason }),
    });
    if (!resp.ok) throw new Error('Failed to decommission asset');
    alert('Asset decommissioned. Its history stays intact, but it no longer appears in the active register.');
    renderAssets();
    loadAssetsAndInit();
  } catch (err) {
    alert('Error: ' + err.message);
  }
}

async function loadAssetsAndInit() {
  const loadingEl = document.getElementById('loading-screen');
  try {
    const resp = await fetch('/api/get-assets');
    if (resp.status === 401) {
      window.location.href = '/login.html';
      return;
    }
    if (!resp.ok) throw new Error('Failed to load asset data (' + resp.status + ')');
    const data = await resp.json();
    assets = data.assets || [];
    if (loadingEl) loadingEl.style.display = 'none';
    document.querySelector('.content').style.display = 'block';
    renderDashboard();
  } catch (err) {
    if (loadingEl) {
      loadingEl.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--red,#E74C3C)">' +
        '<div style="font-size:15px;font-weight:600;margin-bottom:8px">Could not load live data</div>' +
        '<div style="font-size:13px;color:var(--muted,#6B7280)">' + err.message + '</div></div>';
    }
    console.error(err);
  }
}

async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login.html';
}

loadAssetsAndInit();

</script>
