<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">GVC Facility Asset Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1A3566; --navy-light: #2A4A7F; --navy-pale: #E8EDF4;
  --red: #E74C3C; --red-bg: #FDE8E6;
  --green: #27AE60; --green-bg: #E8F8EF;
  --amber: #F39C12; --amber-bg: #FEF5E7;
  --blue: #3B82F6; --blue-bg: #EBF2FF;
  --purple: #8B5CF6; --purple-bg: #F3EEFF;
  --teal: #14B8A6; --teal-bg: #E6FBF8;
  --pink: #EC4899; --pink-bg: #FDEBF3;
  --gold: #D4A843; --gold-bg: #FBF3E3;
  --bg: #F0F2F6; --white: #FFFFFF; --text: #1A1A2E; --muted: #6B7280; --border: #E2E6ED;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
button { font-family: inherit; cursor: pointer; }

.header { background: var(--navy); padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.header-logo { width: 40px; height: 40px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 3px; box-sizing: border-box; }
.header-logo img { width: 100%; height: 100%; object-fit: contain; }
.header-left { display: flex; align-items: center; gap: 14px; }
.header-title { color: #fff; font-weight: 700; font-size: 18px; letter-spacing: 0.5px; }
.header-sub { color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 2px; }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
.live-label { color: rgba(255,255,255,0.7); font-size: 12px; display: flex; align-items: center; gap: 6px; }

.tabs { display: flex; background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; overflow-x: auto; }
.tab-btn { display: flex; align-items: center; gap: 8px; padding: 14px 18px; border: none; background: none; color: var(--muted); border-bottom: 2.5px solid transparent; font-weight: 400; font-size: 13.5px; white-space: nowrap; transition: all 0.2s; }
.tab-btn.active { color: var(--navy); border-bottom-color: var(--navy); font-weight: 600; }
.tab-btn svg { width: 18px; height: 18px; }

.content { padding: 20px 24px; max-width: 1100px; margin: 0 auto; }
.view { display: none; } .view.active { display: block; }

.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
.summary-card { background: var(--white); border-radius: 10px; padding: 16px 18px; border: 1px solid var(--border); }
.summary-val { font-size: 28px; font-weight: 700; }
.summary-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

.filters { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--white); color: var(--text); font-size: 12.5px; font-weight: 400; transition: all 0.2s; }
.filter-btn.active { border-color: var(--navy); background: var(--navy); color: #fff; font-weight: 600; }
.filter-select { padding: 7px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--white); font-size: 12.5px; font-family: inherit; color: var(--text); }
.search-input { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); font-size: 13px; font-family: inherit; flex: 1; min-width: 180px; }
.filter-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }

.asset-list { display: flex; flex-direction: column; gap: 8px; }
.asset-row { display: flex; align-items: center; justify-content: space-between; background: var(--white); border-radius: 10px; padding: 14px 18px; border: 1px solid var(--border); cursor: pointer; text-align: left; width: 100%; transition: box-shadow 0.2s; gap: 10px; }
.asset-row:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.asset-name { font-weight: 600; font-size: 14px; }
.asset-id { font-size: 11px; color: var(--muted); font-family: monospace; }
.asset-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
.asset-class { font-size: 10.5px; color: var(--navy); background: var(--navy-pale); padding: 1px 8px; border-radius: 8px; display: inline-block; margin-top: 4px; }
.badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.badge-good { color: var(--green); background: var(--green-bg); }
.badge-warning { color: var(--amber); background: var(--amber-bg); }
.badge-overdue { color: var(--red); background: var(--red-bg); }
.badge-crit { color: var(--red); background: rgba(0,0,0,0.04); font-weight: 500; }
.badge-high { color: var(--amber); background: rgba(0,0,0,0.04); font-weight: 500; }
.badge-medium { color: var(--muted); background: rgba(0,0,0,0.04); font-weight: 500; }
.result-count { font-size: 12px; color: var(--muted); margin-bottom: 10px; }

.detail-panel { background: var(--white); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
.detail-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; }
.detail-title { font-size: 20px; font-weight: 700; }
.detail-sub { font-size: 13px; color: var(--muted); margin-top: 4px; font-family: monospace; }
.detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
.detail-field { padding: 14px 24px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
.detail-field-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.detail-field-value { font-size: 14px; font-weight: 500; margin-top: 4px; }
.detail-alert { padding: 16px 24px; display: flex; align-items: center; gap: 10px; font-size: 13px; }
.lifecycle-bar-wrap { padding: 16px 24px; }
.lifecycle-bar-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.lifecycle-track { background: #E5E7EB; border-radius: 6px; height: 10px; overflow: hidden; }
.lifecycle-fill { height: 100%; border-radius: 6px; transition: width 0.6s; }
.lifecycle-range { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 4px; }
.back-btn { border: none; background: none; color: var(--navy); font-weight: 600; font-size: 13px; padding: 0; margin-bottom: 16px; cursor: pointer; }

.scenario-intro { background: var(--white); border-radius: 12px; border: 1px solid var(--border); padding: 24px; margin-bottom: 20px; }
.start-btn { background: var(--navy); color: #fff; border: none; border-radius: 10px; padding: 14px 32px; font-size: 15px; font-weight: 600; transition: transform 0.15s; }
.start-btn:hover { transform: scale(1.03); }
.start-center { text-align: center; padding: 40px 0; }
.start-hint { font-size: 12px; color: var(--muted); margin-top: 10px; }

.timeline { display: flex; flex-direction: column; position: relative; }
.timeline-line { position: absolute; left: 19px; top: 0; bottom: 0; width: 2px; background: var(--border); z-index: 0; }
.timeline-step { display: flex; gap: 16px; margin-bottom: 8px; position: relative; z-index: 1; opacity: 0.15; transition: opacity 0.5s, transform 0.5s; transform: translateY(8px); }
.timeline-step.visible { opacity: 1; transform: translateY(0); }
.timeline-dot { width: 16px; height: 16px; border-radius: 50%; border: 3px solid #F0F0F0; background: var(--border); transition: all 0.3s; }
.timeline-step.active .timeline-dot { width: 20px; height: 20px; }
.timeline-card { flex: 1; background: var(--white); border-radius: 10px; padding: 14px 18px; border: 1px solid var(--border); transition: all 0.3s; }

.resolved-box { background: var(--green-bg); border-radius: 12px; padding: 20px 24px; margin-top: 12px; margin-left: 56px; border: 1px solid rgba(39,174,96,0.13); }
.resolved-title { font-weight: 700; font-size: 15px; color: var(--green); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.resolved-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
.resolved-label { font-size: 11px; color: var(--muted); }
.resolved-value { font-weight: 600; font-size: 14px; margin-top: 2px; }
.resolved-compare { margin-top: 14px; padding: 12px 16px; background: var(--white); border-radius: 8px; font-size: 13px; line-height: 1.6; }
.replay-btn { margin-top: 14px; background: var(--navy); color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 13px; font-weight: 600; }

/* Dashboard styles */
.dash-kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(145px, 1fr)); gap: 12px; margin-bottom: 20px; }
.dash-kpi { background: var(--white); border-radius: 10px; padding: 16px; border: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.dash-kpi-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.dash-kpi-val { font-size: 24px; font-weight: 700; line-height: 1.1; }
.dash-kpi-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.dash-panel { background: var(--white); border-radius: 10px; padding: 18px; border: 1px solid var(--border); }
.dash-panel-title { font-size: 13px; font-weight: 700; margin-bottom: 14px; }
.dash-grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 14px; }

.donut-wrap { display: flex; align-items: center; gap: 16px; }
.donut-legend { font-size: 12px; line-height: 2; }
.donut-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }

.bar-chart-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.bar-chart-label { font-size: 11px; min-width: 30px; text-align: right; color: var(--muted); }
.bar-group { display: flex; gap: 3px; flex:1; }
.bar-planned { height: 18px; border-radius: 3px; background: var(--navy); }
.bar-completed { height: 18px; border-radius: 3px; background: var(--green); }
.bar-overdue { height: 18px; border-radius: 3px; background: var(--red); }

.cat-bar-row { display:flex; align-items:center; gap:8px; margin-bottom:9px; }
.cat-bar-label { width:130px; font-size:11.5px; color:var(--muted); text-align:right; flex-shrink:0; }
.cat-bar-track { flex:1; height:18px; background:#EEF1F6; border-radius:4px; overflow:hidden; }
.cat-bar-fill { height:100%; border-radius:4px; display:flex; align-items:center; padding-left:8px; font-size:10.5px; font-weight:600; color:#fff; }

.wo-summary { display: flex; gap: 12px; text-align: center; }
.wo-box { flex: 1; padding: 12px 8px; border-radius: 10px; }
.wo-box-val { font-size: 22px; font-weight: 700; }
.wo-box-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

.alert-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.alert-item:last-child { border-bottom: none; }
.alert-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; }
.alert-time { font-size: 10px; color: var(--muted); white-space: nowrap; margin-left: auto; flex-shrink: 0; }

.maint-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.maint-item:last-child { border-bottom: none; }
.maint-icon { margin-right: 8px; }

.doc-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.doc-item:last-child { border-bottom: none; }
.doc-icon { width: 28px; height: 28px; border-radius: 6px; background: var(--navy-pale); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

.view-link { font-size: 12px; color: var(--navy); font-weight: 600; margin-top: 10px; display: inline-block; }

.footer { text-align: center; padding: 24px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); margin-top: 40px; }

/* Systems tab */
.sys-card { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:14px; }
.sys-card-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; flex-wrap:wrap; gap:8px; }
.sys-card-name { font-size:15px; font-weight:700; color:var(--navy); }
.sys-card-count { font-size:11px; font-weight:600; padding:4px 12px; border-radius:12px; background:var(--navy-pale); color:var(--navy); }
.sys-card-desc { font-size:13px; color:var(--muted); line-height:1.6; }

/* Maintenance tab */
.freq-row { display:flex; align-items:center; gap:10px; margin-bottom:9px; }
.freq-label { width:150px; font-size:12px; color:var(--muted); text-align:right; flex-shrink:0; }
.freq-track { flex:1; height:20px; background:#EEF1F6; border-radius:4px; overflow:hidden; }
.freq-fill { height:100%; border-radius:4px; display:flex; align-items:center; padding-left:8px; font-size:11px; font-weight:600; color:#fff; }

.wo-flow { display:flex; flex-direction:column; gap:0; }
.wo-flow-step { display:flex; gap:14px; position:relative; padding-bottom:22px; }
.wo-flow-step::before { content:''; position:absolute; left:15px; top:32px; bottom:0; width:2px; background:var(--border); }
.wo-flow-step:last-child::before { display:none; }
.wo-flow-num { width:32px; height:32px; border-radius:50%; background:var(--navy); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex-shrink:0; }
.wo-flow-body { flex:1; padding-top:2px; }
.wo-flow-title { font-weight:600; font-size:13.5px; }
.wo-flow-desc { font-size:12.5px; color:var(--muted); margin-top:3px; line-height:1.5; }
.wo-flow-channel { display:inline-block; font-size:10px; font-weight:600; padding:2px 8px; border-radius:8px; margin-top:6px; margin-right:6px; }
.chan-sms { background:var(--blue-bg); color:var(--blue); }
.chan-email { background:var(--purple-bg); color:var(--purple); }
.chan-system { background:var(--green-bg); color:var(--green); }

/* Level view */
.level-row { display:flex; justify-content:space-between; align-items:flex-start; padding:12px 0; border-bottom:1px solid var(--border); gap:10px; }
.level-row:last-child { border-bottom:none; }
.level-name { font-size:13.5px; font-weight:700; color:var(--navy); }
.level-detail { font-size:11.5px; color:var(--muted); margin-top:2px; }
.level-count { font-size:12px; color:var(--muted); white-space:nowrap; font-weight:600; }

@media (max-width: 700px) {
  .dash-grid { grid-template-columns: 1fr; }
  .dash-grid-4 { grid-template-columns: 1fr; }
  .dash-kpi-grid { grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); }
}
</style>
<script src="https://unpkg.com/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo"><img src="/logo.png" alt="GVC"></div>
    <div>
      <div class="header-title">Facility Asset Manager</div>
      <div class="header-sub" id="header-subtitle">Prepared for [Client Name] — [Building Name] · MEP Systems</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <div class="live-label"><div class="live-dot"></div> Live Monitoring</div>
    <button onclick="logout()" style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">Log Out</button>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Dashboard
  </button>
  <button class="tab-btn" data-tab="assets" onclick="switchTab('assets')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v3"/></svg>
    Asset Register
  </button>
  <button class="tab-btn" data-tab="systems" onclick="switchTab('systems')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 10v6m11-11h-6M7 12H1m17.36-6.36l-4.24 4.24M9.88 14.12l-4.24 4.24m0-13.72l4.24 4.24m4.24 4.24l4.24 4.24"/></svg>
    Systems
  </button>
  <button class="tab-btn" data-tab="maintenance" onclick="switchTab('maintenance')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
    Maintenance
  </button>
  <button class="tab-btn" data-tab="levelview" onclick="switchTab('levelview')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
    Level View
  </button>
  <button class="tab-btn" data-tab="floorplan" onclick="switchTab('floorplan')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8" cy="10" r="1.5" fill="currentColor"/><circle cx="15" cy="14" r="1.5" fill="currentColor"/></svg>
    Floor Plan
  </button>
  <button class="tab-btn" data-tab="workorders" onclick="switchTab('workorders')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    Work Orders
  </button>
</div>

<div id="loading-screen" style="text-align:center;padding:100px 20px;">
  <div style="width:36px;height:36px;border:3px solid #E2E6ED;border-top-color:#1A3566;border-radius:50%;margin:0 auto 16px;animation:spin 0.8s linear infinite;"></div>
  <div style="font-size:14px;color:#6B7280;">Loading live asset data…</div>
</div>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>

<div class="content" style="display:none;">
  <div id="view-dashboard" class="view active"></div>
  <div id="view-assets" class="view"></div>
  <div id="view-systems" class="view"></div>
  <div id="view-maintenance" class="view"></div>
  <div id="view-levelview" class="view"></div>
  <div id="view-floorplan" class="view"></div>
  <div id="view-workorders" class="view"></div>
</div>

<div class="footer">Gracing Ventures · BIM Training – Coordination – Information Management · Tanzania</div>

<script>
// ============================================================
// BRANDING CONFIG — edit these 4 lines for each client deployment.
// Nothing else in this file needs to change per client.
// ============================================================
const CLIENT_CONFIG = {
  clientName: "Sali International Hospital",
  buildingLabel: "[Floor/Zone — confirm after site survey]", // fill in once the pilot floor/zone is agreed (Field 1 of the scope PDF)
  region: "Zanzibar",           // project-level — one project = one region, set once here, not per-asset
  district: "Zanzibar Urban",   // project-level — same reasoning as region
  building: "[Building name]",  // project-level — the facility/building name for this deployment
  accentColor: "#1A3566",
  pageTitle: "GVC Facility Asset Manager"
};

// Apply config to the page (header text, browser tab title)
document.title = CLIENT_CONFIG.pageTitle + " — " + CLIENT_CONFIG.clientName;
document.addEventListener('DOMContentLoaded', () => {
  const sub = document.getElementById('header-subtitle');
  if (sub) sub.textContent = `Prepared for ${CLIENT_CONFIG.clientName} — ${CLIENT_CONFIG.building} · ${CLIENT_CONFIG.district}, ${CLIENT_CONFIG.region} · MEP Systems`;
});

let assets = []; // populated live from Airtable via /api/get-assets
let currentUserRole = "engineer";
let currentUserPermissions = null; // filled in after login by loadAssetsAndInit(), see ROLE_PERMISSIONS below
let currentDashboardWindow = 30; // days — changeable via the dashboard timeframe selector

// TEMPORARY (Grace, July 2026): showing cost/depreciation data to every role
// for now, while access control is worked out per-client. Flip this to
// `false` (and set the same flag in api/get-assets.js) to restore the
// original rule — Business Owner and System Admin only.
const TEMP_SHOW_COST_TO_ALL = true;

// Legacy imported assets use "L1", "L14" etc. In this building, L1 is the
// Ground Floor and L15 is the top floor (no separate rooftop level) — so
// L1 -> GF, and everything above shifts down by one: L2 -> F1, L15 -> F14.
// New assets (via Add Asset) already use the correct GF/B1-B3/M/F1-F20/RF
// convention directly, so this only affects display of legacy "L" data —
// the underlying Airtable value is untouched, safe to run every time.
// Calculated from the asset's own Last Service and Next Service Due dates —
// not a separately typed number, so it can never drift out of sync with
// what's actually on record. Returns null if either date is missing.
function calcMaintenanceInterval(lastService, nextService) {
  if (!lastService || !nextService) return null;
  const days = Math.round((new Date(nextService) - new Date(lastService)) / 86400000);
  return days > 0 ? days : null;
}
function formatInterval(days) {
  if (days === null || days === undefined) return '—';
  if (days >= 60) return `${days}d (~${Math.round(days/30)}mo)`;
  return `${days} days`;
}

function displayFloor(floor) {
  if (!floor) return '';
  const m = floor.match(/^L(\d+)$/i);
  if (!m) return floor; // already GF/B1/F3/M/RF etc — pass through unchanged
  const n = parseInt(m[1], 10);
  return n === 1 ? 'GF' : `F${n - 1}`;
}

// Some Room/Zone values are free text that embed the old floor naming
// inside the description itself (e.g. "L14 Office Entry", "Level 8
// Mechanical Room", "Rooftop Level 15") rather than using the clean
// coded Floor field. This relabels those embedded references the same
// way displayFloor() does, so the whole system reads consistently —
// the underlying Airtable text is untouched, display only.
function displayRoom(room) {
  if (!room) return '';
  let out = room;
  // Spelled-out "Level N" -> "Ground Floor" or "Floor N-1"
  out = out.replace(/\bLevel\s+(\d+)\b/gi, (full, numStr) => {
    const n = parseInt(numStr, 10);
    return n === 1 ? 'Ground Floor' : `Floor ${n - 1}`;
  });
  // Compact "L14" style token -> "GF" or "F13"
  out = out.replace(/\bL(\d+)\b/gi, (full, numStr) => {
    const n = parseInt(numStr, 10);
    return n === 1 ? 'GF' : `F${n - 1}`;
  });
  return out;
}

function drawDonut(canvas, segments, size) {
  const ctx = canvas.getContext('2d');
  const cx = size/2, cy = size/2, r = size*0.38, inner = size*0.26;
  let start = -Math.PI/2;
  const total = segments.reduce((s,seg)=>s+seg.value,0);
  segments.forEach(seg => {
    const angle = (seg.value/total)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,start+angle);
    ctx.closePath(); ctx.fillStyle = seg.color; ctx.fill();
    start += angle;
  });
  ctx.beginPath(); ctx.arc(cx,cy,inner,0,Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.fill();
}

    if(currentStatusFilter!=="All" && a.status!==currentStatusFilter) return false;
    if(currentCriticalityFilter!=="All" && a.criticality!==currentCriticalityFilter) return false;
    if(currentNatureFilter!=="All" && a.nature!==currentNatureFilter) return false;
    if(currentMobilityFilter!=="All" && a.mobility!==currentMobilityFilter) return false;
    if(currentCategoryFilter!=="All" && a.category!==currentCategoryFilter) return false;
    if(currentFloorFilter!=="All" && a.floor!==currentFloorFilter) return false;
    if(currentRoomFilter!=="All" && a.room!==currentRoomFilter) return false;
    if(currentSearch) {
      const q = currentSearch.toLowerCase();
      const hay = (a.id+" "+a.name+" "+a.room+" "+a.manufacturer+" "+a.model+" "+a.category+" "+(a.nature||"")+" "+(a.category||"")+" "+(a.building||"")+" "+(a.room||"")).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

function renderAssets() {
  const systems = ["All", ...systemDefs.map(s=>s.name)];
  const total = assets.length, crit = assets.filter(a=>a.criticality==="High").length;
  const attn = assets.filter(a=>a.status==="Critical").length;
  const sched = assets.filter(a=>a.status==="Poor").length;

  let html = `<div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button onclick="openAddAssetForm()" style="padding:8px 16px;font-size:12.5px;font-weight:600;border:none;border-radius:8px;background:var(--navy);color:#fff;cursor:pointer">+ Add Asset</button></div>`;
  html += `<div class="summary-grid">
    <div class="summary-card"><div class="summary-val" style="color:var(--navy)">${total}</div><div class="summary-label">Total Assets</div></div>
    <div class="summary-card"><div class="summary-val" style="color:var(--red)">${crit}</div><div class="summary-label">Critical Systems</div></div>
    <div class="summary-card"><div class="summary-val" style="color:var(--amber)">${sched}</div><div class="summary-label">Poor</div></div>
    <div class="summary-card"><div class="summary-val" style="color:var(--red)">${attn}</div><div class="summary-label">Critical</div></div>
  </div>`;

  // Search input uses renderAssetResults() ONLY — never renderAssets() —
  // so typing never rebuilds this input itself. Rebuilding it mid-type
  // is what caused the "type one letter, lose focus" bug: the browser
  // can't keep a cursor position in a DOM node that just got destroyed
  // and recreated.
  html += `<div class="filter-row">
    <input type="text" id="assetSearchInput" class="search-input" placeholder="Search by asset ID, name, location, manufacturer…" value="${currentSearch}" oninput="currentSearch=this.value;renderAssetResults()">
    <select class="filter-select" onchange="currentStatusFilter=this.value;renderAssets()">
      <option value="All">All Status</option>
      <option value="Good"${currentStatusFilter==='Good'?' selected':''}>Good</option>
      <option value="Poor"${currentStatusFilter==='Poor'?' selected':''}>Poor</option>
      <option value="Critical"${currentStatusFilter==='Critical'?' selected':''}>Critical</option>
    </select>
    <select class="filter-select" onchange="currentCriticalityFilter=this.value;renderAssets()">
      <option value="All">All Criticality</option>
      <option value="High"${currentCriticalityFilter==='High'?' selected':''}>High</option>
      <option value="Medium"${currentCriticalityFilter==='Medium'?' selected':''}>Medium</option>
      <option value="Low"${currentCriticalityFilter==='Low'?' selected':''}>Low</option>
    </select>
  </div>`;

  // Full hierarchy + location filter row, in order: Nature -> Mobility -> Category
  // -> System -> Floor -> Room/Zone. Each narrows the options in the next one.
  // Hidden entirely if no assets have classification data yet (e.g. before backfill import).
  const uniqueNatures = [...new Set(assets.map(a=>a.nature).filter(Boolean))];
  if (uniqueNatures.length > 0) {
    const filteredByNature = currentNatureFilter==="All" ? assets : assets.filter(a=>a.nature===currentNatureFilter);
    const uniqueMobilities = [...new Set(filteredByNature.map(a=>a.mobility).filter(Boolean))];
    const filteredByMobility = currentMobilityFilter==="All" ? filteredByNature : filteredByNature.filter(a=>a.mobility===currentMobilityFilter);
    const uniqueCategories = [...new Set(filteredByMobility.map(a=>a.category).filter(Boolean))];
    const filteredByCat = currentCategoryFilter==="All" ? filteredByMobility : filteredByMobility.filter(a=>a.category===currentCategoryFilter);
    const uniqueSystemsInBranch = [...new Set(filteredByCat.map(a=>a.system).filter(Boolean))].sort();
    const filteredBySystem = currentSystemFilter==="All" ? filteredByCat : filteredByCat.filter(a=>a.system===currentSystemFilter);
    const uniqueFloors = [...new Set(filteredBySystem.map(a=>a.floor).filter(Boolean))]
      .sort((a,b) => displayFloor(a).localeCompare(displayFloor(b), undefined, {numeric:true}));
    const filteredByFloor = currentFloorFilter==="All" ? filteredBySystem : filteredBySystem.filter(a=>a.floor===currentFloorFilter);
    const uniqueRooms = [...new Set(filteredByFloor.map(a=>a.room).filter(Boolean))].sort();

    html += `<div class="filter-row" style="gap:6px;flex-wrap:wrap">
      <select class="filter-select" onchange="currentNatureFilter=this.value;currentMobilityFilter='All';currentCategoryFilter='All';currentSystemFilter='All';currentFloorFilter='All';currentRoomFilter='All';renderAssets()">
        <option value="All">All Types</option>
        ${uniqueNatures.map(n=>`<option value="${n}"${currentNatureFilter===n?' selected':''}>${n}</option>`).join('')}
      </select>
      ${currentNatureFilter==='Tangible' ? `<select class="filter-select" onchange="currentMobilityFilter=this.value;currentCategoryFilter='All';currentSystemFilter='All';currentFloorFilter='All';currentRoomFilter='All';renderAssets()">
        <option value="All">All Mobility</option>
        ${uniqueMobilities.map(m=>`<option value="${m}"${currentMobilityFilter===m?' selected':''}>${m}</option>`).join('')}
      </select>` : ''}
      <select class="filter-select" onchange="currentCategoryFilter=this.value;currentSystemFilter='All';currentFloorFilter='All';currentRoomFilter='All';renderAssets()">
        <option value="All">All Categories</option>
        ${uniqueCategories.map(c=>`<option value="${c}"${currentCategoryFilter===c?' selected':''}>${c}</option>`).join('')}
      </select>
      <select class="filter-select" onchange="currentSystemFilter=this.value;currentFloorFilter='All';currentRoomFilter='All';renderAssets()">
        <option value="All">All Systems</option>
        ${uniqueSystemsInBranch.map(s=>`<option value="${s}"${currentSystemFilter===s?' selected':''}>${s}</option>`).join('')}
      </select>
      <select class="filter-select" onchange="currentFloorFilter=this.value;currentRoomFilter='All';renderAssets()">
        <option value="All">All Floors</option>
        ${uniqueFloors.map(f=>`<option value="${f}"${currentFloorFilter===f?' selected':''}>${displayFloor(f)}</option>`).join('')}
      </select>
      <select class="filter-select" onchange="currentRoomFilter=this.value;renderAssets()">
        <option value="All">All Rooms/Zones</option>
        ${uniqueRooms.map(r=>`<option value="${r}"${currentRoomFilter===r?' selected':''}>${displayRoom(r)}</option>`).join('')}
      </select>
      ${(currentNatureFilter!=='All'||currentMobilityFilter!=='All'||currentCategoryFilter!=='All'||currentSystemFilter!=='All'||currentFloorFilter!=='All'||currentRoomFilter!=='All') ? `<button class="filter-btn" onclick="currentNatureFilter='All';currentMobilityFilter='All';currentCategoryFilter='All';currentSystemFilter='All';currentFloorFilter='All';currentRoomFilter='All';renderAssets()" style="font-size:11px">✕ Clear</button>` : ''}
    </div>`;
  } else {
    // No classification data yet (pre-backfill) — still offer a plain System filter
    // as buttons so System filtering works even before Nature/Category are populated.
    html += `<div class="filters">`;
    systems.forEach(c => { html += `<button class="filter-btn${currentSystemFilter===c?' active':''}" onclick="currentSystemFilter='${c}';renderAssets()">${c}</button>`; });
    html += `</div>`;
  }

  html += `<div id="assetResultsContainer"></div>`;

  document.getElementById('view-assets').innerHTML = html;
  renderAssetResults(); // populate the results container on initial/full render
}

// Renders ONLY the result count + asset list — called on every
// keystroke in search, and by renderAssets() itself after a full
// rebuild. Never touches the search input, dropdowns, or filter chips,
// so it can run continuously while someone is typing without breaking
// focus.
function renderAssetResults() {
  const filtered = getFilteredAssets();
  const container = document.getElementById('assetResultsContainer');
  if (!container) return;
  const canSeeCost = TEMP_SHOW_COST_TO_ALL || (currentUserPermissions && currentUserPermissions.viewCostAndDepreciation);

  let html = `<div class="result-count">Showing ${filtered.length} of ${assets.length} assets</div>`;
  html += `<div class="asset-list">`;
  filtered.forEach((a) => {
    const idx = assets.indexOf(a);
    const interval = calcMaintenanceInterval(a.lastService, a.nextService);
    const intervalBlock = `
      <div style="text-align:right;flex-shrink:0;min-width:90px">
        <div style="font-size:11px;color:var(--muted)">Interval</div>
        <div style="font-size:13px;font-weight:600;color:var(--text)">${formatInterval(interval)}</div>
      </div>`;
    const valueBlock = canSeeCost ? `
      <div style="text-align:right;flex-shrink:0;min-width:110px">
        <div style="font-size:11px;color:var(--muted)">Current Value</div>
        <div style="font-size:13px;font-weight:600;color:var(--navy)">${a.currentValue !== null && a.currentValue !== undefined ? 'TZS ' + Number(a.currentValue).toLocaleString() : '—'}</div>
        ${a.fullyDepreciated ? '<div style="font-size:10px;color:var(--muted)">fully depreciated</div>' : ''}
      </div>` : '';
    html += `<button class="asset-row" onclick="showDetail(${idx})">
      <div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="asset-name">${a.name}</span><span class="asset-id">${a.id}</span></div>
      <div class="asset-meta">${displayRoom(a.room)} · ${a.manufacturer} ${a.model}</div>
      <span class="asset-class">${a.category}</span></div>
      ${valueBlock}
      ${intervalBlock}
      <div style="display:flex;align-items:center;gap:10px;flex-shrink:0"><span class="badge ${statusBadge(a.status)}">${a.status}</span><span class="badge ${critBadge(a.criticality)}">${a.criticality}</span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div></button>`;
  });
  html += `</div>`;
  container.innerHTML = html;
}

function showDetail(idx) {
  const a = assets[idx];
  const age = a.installDate ? (new Date().getFullYear()) - parseInt(a.installDate.split("-")[0]) : 0;
  const pct = Math.min((age/a.lifespan)*100, 100);
  const eol = a.installDate ? parseInt(a.installDate.split("-")[0]) + a.lifespan : "—";
  const canManage = currentUserPermissions && currentUserPermissions.addOrDecommissionAssets;
  const canSeeCost = TEMP_SHOW_COST_TO_ALL || (currentUserPermissions && currentUserPermissions.viewCostAndDepreciation);
  const statusClass = (a.status||"").toLowerCase() === "good" ? "badge-good" : (a.status||"").toLowerCase() === "poor" ? "badge-warning" : "badge-overdue";
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(window.location.origin + '/asset.html?id=' + a.id)}`;

  let html = `<button class="back-btn" onclick="renderAssets()">← Back to Asset Register</button>
  <div class="detail-panel"><div class="detail-header"><div><div class="detail-title">${a.name}</div><div class="detail-sub">${a.id} · ${a.system}</div></div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    ${canManage ? `<button onclick="openEditForm(${idx})" style="padding:6px 14px;font-size:12px;font-weight:600;border:1px solid var(--navy);border-radius:8px;background:#fff;color:var(--navy);cursor:pointer">✎ Edit</button>` : ""}
    ${canManage ? `<button onclick="openRelocateForm('${a.recordId}', '${a.name.replace(/'/g,"\\'")}')" style="padding:6px 14px;font-size:12px;font-weight:600;border:1px solid var(--amber);border-radius:8px;background:#fff;color:var(--amber);cursor:pointer">Relocate</button>` : ""}
    ${canManage ? `<button onclick="decommissionAsset('${a.recordId}', '${a.name.replace(/'/g,"\\'")}')" style="padding:6px 14px;font-size:12px;font-weight:600;border:1px solid var(--red);border-radius:8px;background:#fff;color:var(--red);cursor:pointer">Decommission</button>` : ""}
    <span class="badge ${statusClass}" style="padding:4px 12px;border-radius:14px;font-size:12px">${a.status}</span>
    <span class="badge ${critBadge(a.criticality)}" style="padding:4px 12px;border-radius:14px;font-size:12px">${a.criticality}</span>
  </div></div>
  <div style="display:flex;gap:20px;padding:16px 24px;border-bottom:1px solid var(--border);align-items:flex-start;flex-wrap:wrap">
    <img src="${qrUrl}" alt="QR Code for ${a.id}" style="width:120px;height:120px;border-radius:6px;border:1px solid var(--border)" title="Scan to view this asset's public info page">
    <div style="flex:1;min-width:200px">
      <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Classification</div>
      <div style="font-size:13px;line-height:1.8">${a.nature || "—"} → ${a.mobility ? a.mobility + " → " : ""}${a.category || "—"}</div>
      <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin:10px 0 6px">Status</div>
      <span class="badge ${statusClass}" style="padding:4px 12px;border-radius:14px;font-size:12px">${a.status || "Good"}</span>
    </div>
  </div>
  <div class="detail-grid">`;

  const fields = [
    ["Floor/Level", displayFloor(a.floor) || "—"],
    ["Room/Zone", displayRoom(a.room) || "—"],
    ["System", a.system || "—"],
    ["Manufacturer", a.manufacturer],
    ["Model", a.model],
    ["Install Date", a.installDate],
    ["Expected Lifespan", a.lifespan+" years"],
    ["Asset Age", age+" years"],
    ["Last Service", a.lastService || "—"],
    ["Next Service Due", a.nextService || "—"],
    ["Maintenance Interval (Calculated)", formatInterval(calcMaintenanceInterval(a.lastService, a.nextService))],
    ["Added By", a.addedBy || "— (existing at pilot start)"],
  ];
  if (canSeeCost) {
    fields.push(["Acquisition Cost (TZS)", a.acquisitionCost ? Number(a.acquisitionCost).toLocaleString() : "Not set"]);
    fields.push(["Current Value (Calculated)", a.currentValue !== null && a.currentValue !== undefined ? Number(a.currentValue).toLocaleString() + (a.fullyDepreciated ? " (fully depreciated)" : "") : "—"]);
    if (a.annualDepreciation) fields.push(["Annual Depreciation", Number(a.annualDepreciation).toLocaleString() + " /yr"]);
  }
  fields.forEach(([l,v])=>{
    html += `<div class="detail-field"><div class="detail-field-label">${l}</div><div class="detail-field-value">${v}</div></div>`;
  });
  html += `</div>`;
  if(a.note) {
    html += `<div class="detail-alert" style="background:${statusBg(a.status)}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span><strong>Note:</strong> ${a.note}</span></div>`;
  }
  html += `<div class="lifecycle-bar-wrap"><div class="lifecycle-bar-label">Lifecycle Position</div><div class="lifecycle-track"><div class="lifecycle-fill" style="width:${pct}%;background:${barColor(pct)}"></div></div><div class="lifecycle-range"><span>Installed ${a.installDate}</span><span>Expected end-of-life ${eol}</span></div></div>`;

  // Per-asset download options
  html += `<div style="display:flex;gap:8px;padding:16px 24px;border-top:1px solid var(--border)">
    <span style="font-size:11px;color:var(--muted);align-self:center">Download this asset:</span>
    <button onclick="exportSingleAssetFormat('${a.id}','xlsx')" style="padding:5px 12px;font-size:11px;font-weight:600;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--navy);cursor:pointer">XLSX</button>
    <button onclick="exportSingleAssetFormat('${a.id}','csv')" style="padding:5px 12px;font-size:11px;font-weight:600;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--navy);cursor:pointer">CSV</button>
    <button onclick="exportSingleAssetFormat('${a.id}','pdf')" style="padding:5px 12px;font-size:11px;font-weight:600;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--navy);cursor:pointer">PDF</button>
    <button onclick="downloadQrCode('${qrUrl}','${a.id}')" style="padding:5px 12px;font-size:11px;font-weight:600;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--navy);cursor:pointer">↓ QR Code</button>
  </div>`;

  // Audit trail — edit history
  html += `<div id="editLogSection" style="padding:16px 24px;border-top:1px solid var(--border)">
    <div style="font-size:12px;font-weight:600;color:var(--navy);margin-bottom:8px">Edit History</div>
    <div id="editLogEntries" style="font-size:12px;color:var(--muted)">Loading…</div>
  </div>`;

  html += `</div>`; // close detail-panel
  document.getElementById('view-assets').innerHTML = html;

  // Load edit log
  fetch('/api/get-assets?editlog=true&id=' + encodeURIComponent(a.id))
    .then(r => r.json())
    .then(data => {
      const el = document.getElementById('editLogEntries');
      if (!data.entries || data.entries.length === 0) {
        el.textContent = 'No edits recorded yet.';
        return;
      }
      el.innerHTML = data.entries.map(e => {
        const dt = new Date(e.timestamp);
        const dateStr = dt.toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}) + ', ' + dt.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
        return `<div style="padding:6px 0;border-bottom:1px solid var(--border)"><strong>${e.field}</strong> changed from "${e.oldValue}" to "${e.newValue}" — by <strong>${e.editedBy}</strong> at ${dateStr}</div>`;
      }).join('');
    })
    .catch(() => {
      const el = document.getElementById('editLogEntries');
      if (el) el.textContent = 'Could not load edit history.';
    });
}

function onEditNatureChange(skipReset, preselectCategory) {
  const nature = document.getElementById('ea_nature').value;
  document.getElementById('ea_mobilityWrap').style.display = nature === 'Tangible' ? 'block' : 'none';
  onEditCategoryOptionsRefresh(preselectCategory);
}
function onEditCategoryOptionsRefresh(preselectCategory) {
  const nature = document.getElementById('ea_nature').value;
  const mobility = document.getElementById('ea_mobility') ? document.getElementById('ea_mobility').value : 'Movable';
  const categorySelect = document.getElementById('ea_category');
  let categories;
  if (nature === 'Intangible') categories = ASSET_HIERARCHY.Intangible;
  else if (nature === 'Tangible') categories = ASSET_HIERARCHY.Tangible[mobility];
  else categories = ['Furniture','Equipment','Computer Hardware','Plant & Machinery','Transport Assets','Biological Assets','Valuable Documents','Library Books','Land','Buildings','Infrastructure','Heritage','Minerals & Other Resources','Computer Software','Trademarks','Licenses','Patent Rights','Right to Use','Others'];
  const current = preselectCategory !== undefined ? preselectCategory : categorySelect.value;
  categorySelect.innerHTML = categories.map(c => `<option value="${c}"${c===current?' selected':''}>${c}</option>`).join('');
  if (current && !categories.includes(current)) {
    categorySelect.insertAdjacentHTML('afterbegin', `<option value="${current}" selected>${current} (current)</option>`);
  }
}

function closeEditForm() {
  const overlay = document.getElementById('editAssetOverlay');
  if (overlay) overlay.remove();
}

async function submitAssetEdit(recordId) {
  const errorBox = document.getElementById('editAssetError');
  const btn = document.getElementById('ea_submit');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  errorBox.style.display = 'none';

  const changes = {
    "Name": document.getElementById('ea_name').value.trim(),
    "Asset Nature": document.getElementById('ea_nature').value,
    "Mobility": document.getElementById('ea_nature').value === 'Tangible' ? document.getElementById('ea_mobility').value : '',
    "Asset Category": document.getElementById('ea_category').value,
    "System": document.getElementById('ea_system').value,
    "Floor/Level": document.getElementById('ea_floor').value.trim(),
    "Room/Zone": document.getElementById('ea_room').value.trim(),
    "Manufacturer": document.getElementById('ea_manufacturer').value.trim(),
    "Model": document.getElementById('ea_model').value.trim(),
    "Install Date": document.getElementById('ea_installdate').value,
    "Status": document.getElementById('ea_status').value,
    "Criticality": document.getElementById('ea_criticality').value,
    "Note": document.getElementById('ea_note').value.trim(),
  };
  const costField = document.getElementById('ea_cost');
  if (costField) {
    changes["Acquisition Cost (TZS)"] = costField.value;
    changes["Expected Lifespan (Years)"] = document.getElementById('ea_lifespan').value;
  }

  try {
    const resp = await fetch('/api/manage-asset', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'edit', recordId, changes }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Failed to save changes');
    closeEditForm();
    await loadAssetsAndInit();
    alert(data.changesApplied ? `Saved ${data.changesApplied} change(s).` : 'No changes detected.');
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Save Changes';
  }
}

async function submitRelocation(recordId) {
  const floor = document.getElementById('rel_floor').value.trim();
  const room = document.getElementById('rel_room').value.trim();
  const reason = document.getElementById('rel_reason').value.trim();
  const errorBox = document.getElementById('relocateError');
  const btn = document.getElementById('rel_submit');

  if (!floor && !room) {
    errorBox.textContent = 'Enter at least a new floor or room/zone.';
    errorBox.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Relocating…';
  errorBox.style.display = 'none';

  try {
    const resp = await fetch('/api/manage-asset', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ recordId, newFloor: floor, newRoom: room, reason }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Failed to relocate');
    document.getElementById('relocateOverlay').remove();
    loadAssetsAndInit();
    alert('Asset relocated successfully.');
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Relocate';
  }
}

function statusDotColor(status) {
  if (status === "Good") return "#16a34a";
  if (status === "Poor") return "#d97706";
  return "#dc2626"; // Critical
}

async function renderFloorPlan() {
  const container = document.getElementById('view-floorplan');
  const canManage = currentUserPermissions && currentUserPermissions.addOrDecommissionAssets;

  const uniqueFloors = [...new Set(assets.map(a => a.floor).filter(Boolean))]
    .sort((a, b) => displayFloor(a).localeCompare(displayFloor(b), undefined, { numeric: true }));

  if (!floorPlanCurrentFloor && uniqueFloors.length > 0) floorPlanCurrentFloor = uniqueFloors[0];

  let html = `<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
    <select class="filter-select" onchange="floorPlanCurrentFloor=this.value;floorPlanPlacementMode=false;floorPlanSelectedAssetId=null;renderFloorPlan()">
      ${uniqueFloors.map(f => `<option value="${f}"${f===floorPlanCurrentFloor?' selected':''}>${displayFloor(f)}</option>`).join('')}
    </select>
    <div style="display:flex;gap:12px;font-size:12px;color:var(--muted);margin-left:auto">
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#16a34a;margin-right:4px"></span>Good</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#d97706;margin-right:4px"></span>Poor</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#dc2626;margin-right:4px"></span>Critical</span>
    </div>
    ${canManage ? `<button class="filter-btn${floorPlanPlacementMode?' active':''}" onclick="toggleFloorPlanPlacementMode()">${floorPlanPlacementMode ? '✕ Exit Placement Mode' : '📍 Place Markers'}</button>` : ''}
  </div>
  <div id="floorPlanImageWrap" style="position:relative;text-align:center;color:var(--muted);padding:40px">Loading floor plan…</div>`;

  container.innerHTML = html;

  if (!floorPlanCurrentFloor) {
    document.getElementById('floorPlanImageWrap').innerHTML = `<div style="padding:60px 20px">No floors found on any asset yet.</div>`;
    return;
  }

  try {
    const resp = await fetch('/api/get-assets?floorplan=' + encodeURIComponent(floorPlanCurrentFloor));
    const data = await resp.json();
    floorPlanData = data;
    renderFloorPlanImage(canManage);
  } catch (err) {
    document.getElementById('floorPlanImageWrap').innerHTML = `<div style="padding:60px 20px;color:var(--red)">Could not load floor plan: ${err.message}</div>`;
  }
}

function renderFloorPlanImage(canManage) {
  const wrap = document.getElementById('floorPlanImageWrap');
  if (!floorPlanData || !floorPlanData.imageUrl) {
    wrap.innerHTML = `<div style="padding:60px 20px;max-width:480px;margin:0 auto">
      <div style="font-size:14px;font-weight:600;color:var(--navy);margin-bottom:8px">No floor plan image uploaded for ${displayFloor(floorPlanCurrentFloor)} yet</div>
      <div style="font-size:13px;color:var(--muted)">Upload an image for this floor in Airtable's Floor Plans table (Floor = "${floorPlanCurrentFloor}"), then refresh this tab.</div>
    </div>`;
    return;
  }

  const floorAssets = assets.filter(a => a.floor === floorPlanCurrentFloor);
  const positionsByAsset = {};
  (floorPlanData.positions || []).forEach(p => { positionsByAsset[p.assetId] = p; });

  const unplaced = canManage ? floorAssets.filter(a => !positionsByAsset[a.id]) : [];

  let dotsHtml = '';
  floorAssets.forEach(a => {
    const pos = positionsByAsset[a.id];
    if (!pos) return;
    const idx = assets.indexOf(a);
    dotsHtml += `<div class="floorplan-dot" title="${a.name} (${a.id}) — ${a.status}" onclick="${floorPlanPlacementMode ? '' : `showDetail(${idx});switchTab('assets')`}"
      style="position:absolute;left:${pos.x}%;top:${pos.y}%;width:16px;height:16px;border-radius:50%;background:${statusDotColor(a.status)};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3);transform:translate(-50%,-50%);cursor:${floorPlanPlacementMode?'default':'pointer'};z-index:2"></div>`;
  });

  wrap.innerHTML = `
    <div style="position:relative;display:inline-block;max-width:100%">
      <img src="${floorPlanData.imageUrl}" style="max-width:100%;display:block;border-radius:8px;border:1px solid var(--border)" id="floorPlanImg" onclick="handleFloorPlanClick(event)">
      ${dotsHtml}
    </div>
  `;

  if (canManage && floorPlanPlacementMode) {
    let sidebar = `<div style="margin-top:16px;text-align:left;max-width:480px;margin-left:auto;margin-right:auto">
      <div style="font-size:12px;font-weight:600;color:var(--navy);margin-bottom:8px">Unplaced assets on this floor — select one, then click the image where it belongs:</div>`;
    if (unplaced.length === 0) {
      sidebar += `<div style="font-size:12px;color:var(--muted)">All assets on this floor have a marker placed.</div>`;
    } else {
      unplaced.forEach(a => {
        const selected = floorPlanSelectedAssetId === a.id;
        sidebar += `<button onclick="floorPlanSelectedAssetId='${a.id}';renderFloorPlanImage(true)" style="display:block;width:100%;text-align:left;padding:8px 12px;margin-bottom:4px;border-radius:6px;border:1px solid ${selected?'var(--navy)':'var(--border)'};background:${selected?'#F0F4FA':'#fff'};font-size:12px;cursor:pointer">${a.name} <span style="color:var(--muted)">(${a.id})</span></button>`;
      });
    }
    sidebar += `</div>`;
    wrap.insertAdjacentHTML('beforeend', sidebar);
  }
}

function toggleFloorPlanPlacementMode() {
  floorPlanPlacementMode = !floorPlanPlacementMode;
  floorPlanSelectedAssetId = null;
  renderFloorPlanImage(true);
}

async function handleFloorPlanClick(event) {
  if (!floorPlanPlacementMode || !floorPlanSelectedAssetId) return;
  const img = document.getElementById('floorPlanImg');
  const rect = img.getBoundingClientRect();
  const xPct = ((event.clientX - rect.left) / rect.width) * 100;
  const yPct = ((event.clientY - rect.top) / rect.height) * 100;

  try {
    await fetch('/api/manage-asset', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'savePosition', assetId: floorPlanSelectedAssetId, floor: floorPlanCurrentFloor, x: xPct.toFixed(1), y: yPct.toFixed(1) }),
    });
    floorPlanSelectedAssetId = null;
    // Refresh positions from server so the new dot appears immediately
    const resp = await fetch('/api/get-assets?floorplan=' + encodeURIComponent(floorPlanCurrentFloor));
    floorPlanData = await resp.json();
    renderFloorPlanImage(true);
  } catch (err) {
    alert('Could not save marker position: ' + err.message);
  }
}

    } else {

async function updateWorkOrderStatus(recordId, status) {
  try {
    const resp = await fetch('/api/work-orders', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ recordId, status }),
    });
    const data = await resp.json();
    if (!resp.ok || !data.success) {
      const errorDetail = data.errors && data.errors.length ? data.errors[0] : (data.error || 'Unknown error');
      throw new Error(errorDetail);
    }
    renderWorkOrders(); // refresh the summary counts
  } catch (err) {
    alert('Could not update work order:\n\n' + err.message);
  }
}

function toggleAllWorkOrders(checked) {
  document.querySelectorAll('.wo-checkbox').forEach(cb => cb.checked = checked);
  updateBulkCloseButton();
}

function updateBulkCloseButton() {
  const checked = document.querySelectorAll('.wo-checkbox:checked').length;
  const btn = document.getElementById('bulkCloseBtn');
  if (!btn) return;
  btn.textContent = `Close Selected (${checked})`;
  btn.disabled = checked === 0;
  btn.style.opacity = checked === 0 ? '0.5' : '1';
}

// Closes every checked work order in ONE request, then refreshes the
// tab exactly once — not once per item, which is what made closing
// several in a row slow and annoying before.
async function bulkCloseWorkOrders() {
  const ids = Array.from(document.querySelectorAll('.wo-checkbox:checked')).map(cb => cb.dataset.id);
  if (ids.length === 0) return;

  const btn = document.getElementById('bulkCloseBtn');
  btn.disabled = true;
  btn.textContent = `Closing ${ids.length}…`;

  try {
    const resp = await fetch('/api/work-orders', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ recordIds: ids, status: 'Completed' }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Bulk close failed');
    if (data.failed > 0) {
      const errorDetail = data.errors && data.errors.length ? '\n\nReal error from Airtable:\n' + data.errors[0] : '';
      alert(`${data.updated} closed successfully, ${data.failed} failed.${errorDetail}`);
    }
    renderWorkOrders(); // single refresh, after everything is done
  } catch (err) {
    alert('Could not close selected work orders: ' + err.message);
    renderWorkOrders();
  }
}

async function runRealTest(urgency) {
  const assetId = document.getElementById('testAssetId').value.trim();
  const resultBox = document.getElementById('testResult');
  if (!assetId) { alert('Enter a test Asset ID first.'); return; }

  resultBox.style.display = 'block';
  resultBox.style.color = 'var(--muted)';
  resultBox.textContent = `Running real ${urgency} test on ${assetId}…`;

  try {
    const resp = await fetch('/api/run-real-test', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ assetId, urgency }),
    });
    if (resp.status === 401) { window.location.href = '/login.html'; return; }
    const data = await resp.json();

    if (resp.ok && data.success) {
      resultBox.style.color = 'var(--green)';
      resultBox.innerHTML = `✓ Due date set to ${data.dueDateSet} · Email: ${data.email} · SMS: ${data.sms} · Alert Log: ${data.alertLogWritten === true ? 'written' : data.alertLogWritten} · Work Order: ${data.workOrder}`;
      renderWorkOrders(); // refresh so the new/updated work order shows immediately
    } else {
      resultBox.style.color = 'var(--red)';
      resultBox.textContent = '✗ ' + (data.error || 'Test failed');
    }
  } catch (err) {
    resultBox.style.color = 'var(--red)';
    resultBox.textContent = '✗ Network error: ' + err.message;
  }
}

// Shared utility: builds a real .xlsx file (bold header row, correct
// unicode handling — no more broken "—" characters) from any array of
// asset objects. Used by both the full register download and the
// single-asset download button.
function exportAssetsXLSX(assetList, filenameSuffix) {
  const headers = ["Asset ID","Name","System","Class","Level","Location","Manufacturer","Model","Install Date","Status","Criticality","Last Service","Next Service Due"];
  const rows = assetList.map(a => [a.id, a.name, a.system, a.category, displayFloor(a.floor), displayRoom(a.room), a.manufacturer, a.model, a.installDate, a.status, a.criticality, a.lastService, a.nextService]);

  const worksheet = XLSX.utils.aoa_to_sheet([headers, ...rows]);

  // Bold the header row
  const headerRange = XLSX.utils.decode_range(worksheet['!ref']);
  for (let col = headerRange.s.c; col <= headerRange.e.c; col++) {
    const cellRef = XLSX.utils.encode_cell({ r: 0, c: col });
    if (!worksheet[cellRef]) continue;
    worksheet[cellRef].s = { font: { bold: true } };
  }

  // Reasonable column widths so it's readable on open, not cramped
  worksheet['!cols'] = headers.map(h => ({ wch: Math.max(h.length + 2, 14) }));

  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Asset Register");

  const filename = `${CLIENT_CONFIG.clientName.replace(/\s+/g,'_')}_${filenameSuffix}_${new Date().toISOString().split('T')[0]}.xlsx`;
  XLSX.writeFile(workbook, filename, { cellStyles: true });
}

function exportAssetRegisterCSV() {
  exportAssetsXLSX(assets, "Asset_Register");
}

function exportSingleAssetXLSX(assetId) {
  exportSingleAssetFormat(assetId, 'xlsx');
}

// Cross-origin <a download> links often just navigate instead of downloading
// (browsers require same-origin, or a blob, for that attribute to be honored
// reliably). Fetching the QR image ourselves and turning it into a blob URL
// fixes this — this is what actually makes "Download QR" save a real PNG file.
async function downloadQrCode(qrUrl, assetId) {
  try {
    const resp = await fetch(qrUrl);
    if (!resp.ok) throw new Error('QR service returned ' + resp.status);
    const blob = await resp.blob();
    const blobUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = `${assetId}-qr.png`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);
  } catch (err) {
    alert('Could not download QR code: ' + err.message);
  }
}

function exportSingleAssetFormat(assetId, format) {
  const asset = assets.find(a => a.id === assetId);
  if (!asset) { alert("Asset not found."); return; }

  if (format === 'xlsx') {
    exportAssetsXLSX([asset], `Asset_${assetId}`);
    return;
  }

  if (format === 'csv') {
    const headers = ['Asset ID','Name','System','Category','Floor','Room','Manufacturer','Model','Install Date','Status','Criticality','Last Service','Next Service Due'];
    const row = [asset.id, asset.name, asset.system, asset.category, asset.floor, asset.room, asset.manufacturer, asset.model, asset.installDate, asset.status, asset.criticality, asset.lastService, asset.nextService];
    const csv = headers.join(',') + '\n' + row.map(v => `"${v||''}"`).join(',');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${assetId}.csv`;
    a.click();
    return;
  }

  if (format === 'pdf') {
    const win = window.open('', '_blank');
    win.document.write(`
      <html><head><title>${asset.id} — ${asset.name}</title>
      <style>body{font-family:Arial,sans-serif;padding:30px;color:#1A1A2E}h1{color:#1A3566;font-size:20px}
      table{width:100%;border-collapse:collapse;margin-top:16px}td{padding:8px 10px;border-bottom:1px solid #e5e7eb;font-size:13px}
      td:first-child{font-weight:600;color:#6B7280;width:200px}</style></head><body>
      <h1>${asset.name} (${asset.id})</h1>
      <table>

function printMaintenancePlan(windowDays) {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() + windowDays);

  const filtered = assets
    .filter(a => a.nextService && new Date(a.nextService) <= cutoff)
    .slice()
    .sort((a,b) => new Date(a.nextService) - new Date(b.nextService));

  const win = window.open('', '_blank');
  const rows = filtered
    .map(a => `<tr><td>${a.id}</td><td>${a.name}</td><td>${a.system}</td><td>${displayRoom(a.room)}</td><td>${a.criticality}</td><td>${a.status}</td><td>${a.nextService}</td></tr>`)
    .join('');

  win.document.write(`
    <html><head><title>Maintenance Plan — ${CLIENT_CONFIG.clientName}</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 30px; color:#1A1A2E; }
      h1 { color:#1A3566; font-size:20px; }
      .sub { color:#6B7280; font-size:12px; margin-bottom:16px; }
      .empty { color:#6B7280; font-style:italic; padding:12px 0; }
      table { width:100%; border-collapse:collapse; font-size:12px; }
      th { background:#1A3566; color:#fff; text-align:left; padding:8px; }
      td { padding:7px 8px; border-bottom:1px solid #E2E6ED; }
      tr:nth-child(even) { background:#F8FAFC; }
      .download-btn { background:#1A3566; color:#fff; border:none; border-radius:8px; padding:10px 20px; font-size:13px; font-weight:600; cursor:pointer; margin-bottom:20px; }
      @media print { .download-btn { display:none; } }
    </style></head>
    <body>
      <button class="download-btn" onclick="window.print()">↓ Download as PDF</button>
      <h1>Maintenance Plan — Next ${windowDays} Days</h1>
      <div class="sub">Prepared for ${CLIENT_CONFIG.clientName} — ${CLIENT_CONFIG.buildingLabel} · Generated ${new Date().toISOString().split('T')[0]} · Window: through ${cutoff.toISOString().split('T')[0]} · ${filtered.length} asset${filtered.length!==1?'s':''} due</div>

      <table><thead><tr><th>Asset ID</th><th>Name</th><th>System</th><th>Location</th><th>Criticality</th><th>Status</th><th>Next Service Due</th></tr></thead>
      <tbody>${rows}</tbody></table>`}

  win.focus();
}

async function exportMonthlyReportCSV() {
  try {
    const resp = await fetch('/api/monthly-report');
    if (!resp.ok) throw new Error('Failed');
    const data = await resp.json();
    if (!data.events || data.events.length === 0) { alert('No alert data yet.'); return; }
    const header = 'Date/Time,Asset ID,Asset Name,System,Urgency,Channel';
    const rows = data.events.map(e => `"${new Date(e.timestamp).toLocaleString()}","${e.assetId}","${e.assetName}","${e.system}","${e.urgency}","${e.channel}"`).join('\n');
    const blob = new Blob([header + '\n' + rows], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `monthly-report-${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
  } catch (err) { alert('Could not export: ' + err.message); }
}

async function exportMonthlyReportXLSX() {
  try {
    const resp = await fetch('/api/monthly-report');
    if (!resp.ok) throw new Error('Failed');
    const data = await resp.json();
    if (!data.events || data.events.length === 0) { alert('No alert data yet.'); return; }
    const rows = [['Date/Time','Asset ID','Asset Name','System','Urgency','Channel']];
    data.events.forEach(e => rows.push([new Date(e.timestamp).toLocaleString(), e.assetId, e.assetName, e.system, e.urgency, e.channel]));
    const ws = XLSX.utils.aoa_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Monthly Report');
    XLSX.writeFile(wb, `monthly-report-${new Date().toISOString().split('T')[0]}.xlsx`);
  } catch (err) { alert('Could not export: ' + err.message); }
}

// --- Classification hierarchy — exact match to page 10 of the guideline, each branch ends with "Others" ---
const ASSET_HIERARCHY = {
  Tangible: {
    Movable: ["Furniture", "Equipment", "Computer Hardware", "Plant & Machinery", "Transport Assets", "Biological Assets", "Valuable Documents", "Library Books", "Others"],
    Immovable: ["Land", "Buildings", "Infrastructure", "Heritage", "Minerals & Other Resources", "Others"],
  },
  Intangible: ["Computer Software", "Trademarks", "Licenses", "Patent Rights", "Right to Use", "Others"],
};
const CATEGORY_PREFIXES = {
  "Furniture": "FURN", "Equipment": "EQP", "Computer Hardware": "PC", "Plant & Machinery": "PLT",
  "Transport Assets": "VEH", "Biological Assets": "BIO", "Valuable Documents": "DOC", "Library Books": "LIB",
  "Land": "LND", "Buildings": "BLD", "Infrastructure": "INF", "Heritage": "HER", "Minerals & Other Resources": "MIN",
  "Computer Software": "SW", "Trademarks": "TM", "Licenses": "LIC", "Patent Rights": "PAT", "Right to Use": "RTU",
};

function onNatureChange() {
  const nature = document.getElementById('na_nature').value;
  document.getElementById('na_mobilityWrap').style.display = nature === 'Tangible' ? 'block' : 'none';
  onMobilityChange();
}
function onMobilityChange() {
  const nature = document.getElementById('na_nature').value;
  const mobility = document.getElementById('na_mobility').value;
  const categorySelect = document.getElementById('na_category');
  const categories = nature === 'Intangible' ? ASSET_HIERARCHY.Intangible : ASSET_HIERARCHY.Tangible[mobility];
  categorySelect.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
  onCategoryChange();
}
function onCategoryChange() {
  const category = document.getElementById('na_category').value;
  const othersWrap = document.getElementById('na_othersWrap');
  othersWrap.style.display = category === 'Others' ? 'block' : 'none';
  const prefix = CATEGORY_PREFIXES[category] || 'AST';
  document.getElementById('na_prefixHint').textContent = category === 'Others' ? '' : `ID will be auto-generated as ${prefix}-0XX`;
}

function closeAddAssetForm() {
  const overlay = document.getElementById('addAssetOverlay');
  if (overlay) overlay.remove();
}

async function submitNewAsset() {
  const name = document.getElementById('na_name').value.trim();
  const nature = document.getElementById('na_nature').value;
  const mobility = nature === 'Tangible' ? document.getElementById('na_mobility').value : '';
  let category = document.getElementById('na_category').value;
  const errorBox = document.getElementById('addAssetError');
  const btn = document.getElementById('na_submit');

  let customPrefix = null;
  if (category === 'Others') {
    const othersText = document.getElementById('na_othersText').value.trim();
    if (!othersText) {
      errorBox.textContent = 'Please specify the category for "Others".';
      errorBox.style.display = 'block';
      return;
    }
    category = othersText;
    customPrefix = othersText.substring(0,4).toUpperCase().replace(/[^A-Z]/g,'') || 'AST';
  }

  if (!name || !category) {
    errorBox.textContent = 'Name and Category are required.';
    errorBox.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Adding…';
  errorBox.style.display = 'none';

  const costField = document.getElementById('na_cost');
  const lifespanField = document.getElementById('na_lifespan');

  try {
    const resp = await fetch('/api/manage-asset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name, nature, mobility, category, customPrefix,
        system: document.getElementById('na_system').value,
        floor: document.getElementById('na_floor').value,
        room: document.getElementById('na_room').value.trim(),
        manufacturer: document.getElementById('na_manufacturer').value.trim(),
        model: document.getElementById('na_model').value.trim(),
        status: document.getElementById('na_status').value,
        criticality: document.getElementById('na_criticality').value,
        acquisitionCost: costField ? costField.value : undefined,
        lifespan: lifespanField ? lifespanField.value : undefined,
      }),
    });
    const data = await resp.json();

    if (!resp.ok) throw new Error(data.error || 'Failed to add asset');

    closeAddAssetForm();
    loadAssetsAndInit(); // refresh live data so the new asset appears immediately
    alert(`Asset added — ID auto-generated as ${data.assetId}`);
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Add Asset';
  }
}

async function decommissionAsset(recordId, assetName) {
  const reason = prompt(`Decommissioning "${assetName}". Optional reason (e.g. "replaced before end of lifecycle"):`);
  if (reason === null) return; // cancelled

  try {
    const resp = await fetch('/api/manage-asset', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ recordId, reason }),
    });
    if (!resp.ok) throw new Error('Failed to decommission asset');
    alert('Asset decommissioned. Its history stays intact, but it no longer appears in the active register.');
    renderAssets();
    loadAssetsAndInit();
  } catch (err) {
    alert('Error: ' + err.message);
  }
}

async function loadAssetsAndInit() {
  const loadingEl = document.getElementById('loading-screen');
  try {
    const [assetsResp, woResp] = await Promise.all([
      fetch('/api/get-assets'),
      fetch('/api/work-orders'),
    ]);
    if (assetsResp.status === 401) {
      window.location.href = '/login.html';
      return;
    }
    if (!assetsResp.ok) throw new Error('Failed to load asset data (' + assetsResp.status + ')');
    const data = await assetsResp.json();
    assets = data.assets || [];
    currentUserRole = data.role || "engineer";
    currentUserPermissions = ROLE_PERMISSIONS[currentUserRole] || ROLE_PERMISSIONS.engineer;

    // Work orders — non-fatal if this fails (dashboard still renders, just with empty WO data)
    if (woResp.ok) {
      const woData = await woResp.json();
      dashboardWorkOrders = woData.workOrders || [];
    } else {
      dashboardWorkOrders = [];
    }

    if (loadingEl) loadingEl.style.display = 'none';
    document.querySelector('.content').style.display = 'block';
    renderDashboard();
  } catch (err) {
    if (loadingEl) {
      loadingEl.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--red,#E74C3C)">' +
        '<div style="font-size:15px;font-weight:600;margin-bottom:8px">Could not load live data</div>' +
        '<div style="font-size:13px;color:var(--muted,#6B7280)">' + err.message + '</div></div>';
    }
    console.error(err);
  }
}

async function logout() {
  await fetch('/api/login', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({action:'logout'}) });
  window.location.href = '/login.html';
}

loadAssetsAndInit();
