<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GVC Facility Asset Manager — Live Sensor Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0b1729;
    --navy-2: #101f38;
    --card: #14243f;
    --card-border: #223353;
    --text: #e8edf7;
    --text-dim: #8b9bc0;
    --green: #34d399;
    --red: #f87171;
    --amber: #fbbf24;
    --blue-accent: #5b8def;
  }
  * { box-sizing: border-box; }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
  body {
    margin: 0;
    background: var(--navy);
    background-image: radial-gradient(circle at 20% 0%, rgba(91,141,239,0.08), transparent 40%);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
  }
  header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--card-border);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 16px;
  }
  .title-block h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 22px;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .title-block p {
    margin: 0;
    color: var(--text-dim);
    font-size: 13px;
  }
  .live-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--green);
    letter-spacing: 0.05em;
  }
  .pulse-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.6);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.5); }
    70% { box-shadow: 0 0 0 8px rgba(52, 211, 153, 0); }
    100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
  }
  main {
    padding: 28px 32px 60px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-left: 3px solid var(--text-dim);
    border-radius: 10px;
    padding: 18px 20px;
    transition: border-left-color 0.3s ease, transform 0.15s ease;
  }
  .card.in-range { border-left-color: var(--green); }
  .card.out-range { border-left-color: var(--red); }
  .card.no-data { border-left-color: var(--text-dim); opacity: 0.7; }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }
  .asset-name {
    font-weight: 600;
    font-size: 15px;
    margin: 0 0 2px;
  }
  .asset-location {
    color: var(--text-dim);
    font-size: 12px;
    margin: 0;
  }
  .status-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 3px 8px;
    border-radius: 999px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .status-badge.in-range { background: rgba(52,211,153,0.15); color: var(--green); }
  .status-badge.out-range { background: rgba(248,113,113,0.15); color: var(--red); }
  .status-badge.no-data { background: rgba(139,155,192,0.15); color: var(--text-dim); }
  .reading {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 34px;
    font-weight: 600;
    line-height: 1;
    margin-bottom: 8px;
  }
  .reading .unit { font-size: 16px; color: var(--text-dim); margin-left: 4px; }
  .reading.flash { animation: flash 0.6s ease; }
  @keyframes flash {
    0% { color: var(--blue-accent); }
    100% { color: var(--text); }
  }
  .meta-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
  }
  .empty-state, .error-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
  }
  .empty-state h2, .error-state h2 {
    font-family: 'Space Grotesk', sans-serif;
    color: var(--text);
    font-size: 18px;
    margin-bottom: 8px;
  }
  .empty-state code {
    background: var(--card);
    border: 1px solid var(--card-border);
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
  }
  a { color: var(--blue-accent); }
  a:focus-visible, button:focus-visible {
    outline: 2px solid var(--blue-accent);
    outline-offset: 2px;
  }
</style>
</head>
<body>

<header>
  <div class="title-block">
    <h1>Live Sensor Monitor</h1>
    <p>GVC Facility Asset Manager — real-time environmental telemetry</p>
  </div>
  <div class="live-indicator">
    <span class="pulse-dot"></span>
    <span id="live-label">LIVE</span>
    <span id="last-updated" style="color: var(--text-dim); margin-left: 8px;"></span>
  </div>
</header>

<main>
  <div id="content">
    <div class="empty-state">
      <h2>Loading…</h2>
    </div>
  </div>
</main>

<script>
  let previousValues = {};

  function timeAgo(iso) {
    if (!iso) return "no data yet";
    const seconds = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (seconds < 60) return `${seconds}s ago`;
    const mins = Math.floor(seconds / 60);
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    return `${hrs}h ago`;
  }

  function statusClass(withinRange) {
    if (withinRange === true) return "in-range";
    if (withinRange === false) return "out-range";
    return "no-data";
  }

  function statusLabel(withinRange) {
    if (withinRange === true) return "In Range";
    if (withinRange === false) return "Out of Range";
    return "No Data";
  }

  function renderSensors(sensors) {
    const content = document.getElementById("content");

    if (!sensors || sensors.length === 0) {
      content.innerHTML = `
        <div class="empty-state">
          <h2>No sensors registered yet</h2>
          <p>Once a sensor is added to the <code>Sensors</code> table and starts sending readings,<br>it will appear here automatically.</p>
        </div>`;
      return;
    }

    const cardsHtml = sensors.map(s => {
      const cls = statusClass(s.withinRange);
      const key = s.sensorId;
      const prev = previousValues[key];
      const isNewValue = prev !== undefined && prev !== s.latestValue;
      previousValues[key] = s.latestValue;

      const valueDisplay = s.latestValue !== null && s.latestValue !== undefined
        ? `${s.latestValue}<span class="unit">${s.latestUnit || ""}</span>`
        : `—`;

      return `
        <div class="card ${cls}">
          <div class="card-top">
            <div>
              <p class="asset-name">${s.assetName}</p>
              <p class="asset-location">${s.location || "Location not set"}</p>
            </div>
            <span class="status-badge ${cls}">${statusLabel(s.withinRange)}</span>
          </div>
          <div class="reading ${isNewValue ? "flash" : ""}">${valueDisplay}</div>
          <div class="meta-row">
            <span>Target: ${s.targetRange || "not set"}</span>
            <span>${timeAgo(s.lastReadingAt)}</span>
          </div>
        </div>`;
    }).join("");

    content.innerHTML = `<div class="grid">${cardsHtml}</div>`;
  }

  async function fetchAndRender() {
    try {
      const res = await fetch("/api/get-sensor-readings");
      if (res.status === 401) {
        window.location.href = "/login.html";
        return;
      }
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      renderSensors(data.sensors);
      document.getElementById("last-updated").textContent = "updated " + new Date().toLocaleTimeString();
      document.getElementById("live-label").textContent = "LIVE";
      document.getElementById("live-label").style.color = "var(--green)";
    } catch (err) {
      document.getElementById("content").innerHTML = `
        <div class="error-state">
          <h2>Couldn't load sensor data</h2>
          <p>${err.message}</p>
        </div>`;
      document.getElementById("live-label").textContent = "OFFLINE";
      document.getElementById("live-label").style.color = "var(--red)";
    }
  }

  fetchAndRender();
  setInterval(fetchAndRender, 5000);
</script>

</body>
</html>
