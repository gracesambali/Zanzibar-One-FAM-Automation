<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GVC Facility Asset Manager — Login</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, 'Segoe UI', Arial, sans-serif; background:#F0F2F6; color:#1A1A2E; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .card { background:#fff; border-radius:16px; max-width:400px; width:100%; padding:36px 32px; box-shadow:0 4px 24px rgba(0,0,0,.08); }
  .logo-row { display:flex; flex-direction:column; align-items:center; gap:12px; margin-bottom:24px; }
  .logo { width:56px; height:56px; border-radius:50%; overflow:hidden; }
  .logo img { width:100%; height:100%; object-fit:contain; }
  h1 { font-size:18px; color:#1A3566; text-align:center; }
  .sub { font-size:13px; color:#6B7280; margin-top:4px; text-align:center; margin-bottom:8px; }
  label { font-size:12px; font-weight:600; color:#1A3566; display:block; margin-bottom:6px; margin-top:16px; }
  input { width:100%; padding:11px 14px; border:1px solid #E2E6ED; border-radius:8px; font-size:14px; font-family:inherit; }
  .field-wrap { position:relative; }
  .toggle-eye { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; padding:4px; display:flex; align-items:center; color:#6B7280; }
  .toggle-eye:hover { color:#1A3566; }
  .username-suggestions { position:absolute; top:100%; left:0; right:0; background:#fff; border:1px solid #E2E6ED; border-top:none; border-radius:0 0 8px 8px; box-shadow:0 4px 12px rgba(0,0,0,.08); z-index:10; max-height:160px; overflow-y:auto; display:none; }
  .username-suggestions.show { display:block; }
  .suggestion-item { padding:9px 14px; font-size:13px; cursor:pointer; border-bottom:1px solid #F0F2F6; }
  .suggestion-item:last-child { border-bottom:none; }
  .suggestion-item:hover, .suggestion-item.active { background:#F0F4FA; color:#1A3566; }
  button { width:100%; margin-top:22px; padding:14px; border:none; border-radius:10px; background:#1A3566; color:#fff; font-size:15px; font-weight:600; cursor:pointer; transition:transform .15s; }
  button:hover { transform:scale(1.02); }
  button:disabled { opacity:.6; cursor:wait; }
  .error { margin-top:16px; padding:12px 14px; border-radius:8px; font-size:13px; background:#FDE8E6; color:#991B1B; display:none; }
  .error.show { display:block; }
  .footer { text-align:center; font-size:11px; color:#9CA3AF; margin-top:24px; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <div class="logo"><img src="/logo.png" alt="GVC"></div>
      <div>
        <h1>Facility Asset Manager</h1>
        <div class="sub">Sign in to view your building's live data</div>
      </div>
    </div>

    <form id="loginForm">
      <label for="username">Username</label>
      <div class="field-wrap">
        <input id="username" type="text" autocomplete="off" required>
        <div class="username-suggestions" id="usernameSuggestions"></div>
      </div>

      <label for="password">Password</label>
      <div class="field-wrap">
        <input id="password" type="password" autocomplete="current-password" required style="padding-right:40px">
        <button type="button" class="toggle-eye" id="togglePassword" aria-label="Show password">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <button type="submit" id="loginBtn">Sign In</button>
    </form>

    <div id="error" class="error"></div>

    <div class="footer">Gracing Ventures · BIM Information Management · Tanzania</div>
  </div>

<script>
// --- Password show/hide toggle ---
const passwordInput = document.getElementById('password');
const toggleBtn = document.getElementById('togglePassword');
const eyeIcon = document.getElementById('eyeIcon');
const EYE_OPEN = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/>';
const EYE_CLOSED = '<path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a20.3 20.3 0 0 1 5.06-5.94M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a20.3 20.3 0 0 1-2.16 3.19M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';

toggleBtn.addEventListener('click', () => {
  const showing = passwordInput.type === 'text';
  passwordInput.type = showing ? 'password' : 'text';
  eyeIcon.innerHTML = showing ? EYE_OPEN : EYE_CLOSED;
  toggleBtn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
});

// --- Custom recent-username predictive suggestions (not browser autofill) ---
// Stores up to 5 usernames that have successfully logged in on this device,
// in localStorage. After 4+ characters are typed, shows matching recent
// usernames in a dropdown built by us — not the browser's native autofill.
const RECENT_USERS_KEY = 'gvc_recent_usernames';
const usernameInput = document.getElementById('username');
const suggestionsBox = document.getElementById('usernameSuggestions');

function getRecentUsernames() {
  try {
    return JSON.parse(localStorage.getItem(RECENT_USERS_KEY) || '[]');
  } catch { return []; }
}
function saveRecentUsername(name) {
  if (!name) return;
  let list = getRecentUsernames().filter(u => u.toLowerCase() !== name.toLowerCase());
  list.unshift(name);
  list = list.slice(0, 5);
  localStorage.setItem(RECENT_USERS_KEY, JSON.stringify(list));
}
function renderSuggestions(matches) {
  if (matches.length === 0) {
    suggestionsBox.classList.remove('show');
    suggestionsBox.innerHTML = '';
    return;
  }
  suggestionsBox.innerHTML = matches.map(u => `<div class="suggestion-item" data-username="${u}">${u}</div>`).join('');
  suggestionsBox.classList.add('show');
  suggestionsBox.querySelectorAll('.suggestion-item').forEach(el => {
    el.addEventListener('click', () => {
      usernameInput.value = el.dataset.username;
      suggestionsBox.classList.remove('show');
      document.getElementById('password').focus();
    });
  });
}
usernameInput.addEventListener('input', () => {
  const val = usernameInput.value.trim();
  if (val.length < 4) {
    suggestionsBox.classList.remove('show');
    return;
  }
  const matches = getRecentUsernames().filter(u => u.toLowerCase().includes(val.toLowerCase()));
  renderSuggestions(matches);
});
document.addEventListener('click', (e) => {
  if (!e.target.closest('.field-wrap')) suggestionsBox.classList.remove('show');
});

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const errorBox = document.getElementById('error');

  btn.disabled = true;
  btn.textContent = 'Signing in…';
  errorBox.className = 'error';

  try {
    const resp = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await resp.json();

    if (resp.ok && data.success) {
      saveRecentUsername(username);
      window.location.href = '/dashboard.html';
    } else {
      errorBox.textContent = data.error || 'Login failed. Please try again.';
      errorBox.className = 'error show';
    }
  } catch (err) {
    errorBox.textContent = 'Network error: ' + err.message;
    errorBox.className = 'error show';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});
</script>
</body>
</html>
