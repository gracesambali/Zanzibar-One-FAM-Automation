<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report a Breakdown — GVC Facility Asset Manager</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, 'Segoe UI', Arial, sans-serif; background:#F0F2F6; color:#1A1A2E; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .card { background:#fff; border-radius:16px; max-width:440px; width:100%; padding:32px 28px; box-shadow:0 4px 24px rgba(0,0,0,.08); }
  .logo-row { display:flex; align-items:center; gap:12px; margin-bottom:6px; }
  .logo { width:44px; height:44px; border-radius:50%; overflow:hidden; flex-shrink:0; }
  .logo img { width:100%; height:100%; object-fit:contain; }
  h1 { font-size:17px; color:#1A3566; }
  .sub { font-size:12.5px; color:#6B7280; margin-top:2px; margin-bottom:8px; }
  label { font-size:12px; font-weight:600; color:#1A3566; display:block; margin-bottom:6px; margin-top:16px; }
  .hint { font-size:11px; color:#6B7280; margin-top:-3px; margin-bottom:6px; font-weight:400; }
  input, textarea, select { width:100%; padding:11px 14px; border:1px solid #E2E6ED; border-radius:8px; font-size:14px; font-family:inherit; }
  textarea { resize:vertical; min-height:80px; }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  button { width:100%; margin-top:22px; padding:14px; border:none; border-radius:10px; background:#1A3566; color:#fff; font-size:15px; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.6; cursor:wait; }
  .result { margin-top:18px; padding:14px; border-radius:10px; font-size:13.5px; line-height:1.6; display:none; }
  .result.show { display:block; }
  .result.success { background:#E8F8EF; color:#065F46; }
  .result.error { background:#FDE8E6; color:#991B1B; }
  .footer { text-align:center; font-size:11px; color:#9CA3AF; margin-top:22px; }
  .photo-preview { margin-top:10px; display:none; }
  .photo-preview.show { display:block; }
  .photo-preview img { width:100%; max-height:160px; object-fit:cover; border-radius:8px; border:1px solid #E2E6ED; }
  .photo-btn { display:flex; align-items:center; justify-content:center; gap:8px; padding:11px 14px; border:1px dashed #E2E6ED; border-radius:8px; font-size:13px; color:#6B7280; cursor:pointer; background:#fff; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <div class="logo"><img src="/logo.png" alt="GVC"></div>
      <div>
        <h1>Report a Breakdown</h1>
      </div>
    </div>
    <div class="sub">No login needed — the maintenance team is notified the moment you submit.</div>

    <form id="reportForm">
      <label for="reporterName">Your Name *</label>
      <input id="reporterName" type="text" required>

      <label for="reporterRole">Your Role / Department</label>
      <input id="reporterRole" type="text" placeholder="e.g. Ward Nurse, Procurement">

      <label for="reporterContact">Your Phone or Email</label>
      <div class="hint">Optional — so we can tell you once it's actually fixed</div>
      <input id="reporterContact" type="text" placeholder="e.g. +255 7XX XXX XXX or you@email.com">

      <div class="row2">
        <div>
          <label for="floor">Floor *</label>
          <input id="floor" type="text" placeholder="e.g. Level 3" required>
        </div>
        <div>
          <label for="roomZone">Room / Zone</label>
          <input id="roomZone" type="text" placeholder="e.g. Ward B, Room 12">
        </div>
      </div>

      <label for="description">What's wrong? *</label>
      <textarea id="description" placeholder="Describe what you're seeing — noise, leak, not working, etc." required></textarea>

      <label>Photo (optional)</label>
      <div class="hint">A quick picture helps the team understand the issue faster</div>
      <label for="photo" class="photo-btn">📷 Add a Photo</label>
      <input id="photo" type="file" accept="image/*" capture="environment" style="display:none">
      <div id="photoPreview" class="photo-preview"><img id="photoPreviewImg" src=""></div>

      <button type="submit" id="submitBtn">Submit Report</button>
    </form>

    <div id="result" class="result"></div>

    <div class="footer">Gracing Ventures · BIM Information Management · Tanzania</div>
  </div>

<script>
let photoBase64 = null;
let photoFilename = null;
let photoContentType = null;

document.getElementById('photo').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;

  if (file.size > 5 * 1024 * 1024) {
    alert('Photo is larger than 5MB — please choose a smaller one.');
    e.target.value = '';
    return;
  }

  const reader = new FileReader();
  reader.onload = () => {
    photoBase64 = reader.result.split(',')[1];
    photoFilename = file.name;
    photoContentType = file.type || 'image/jpeg';
    document.getElementById('photoPreviewImg').src = reader.result;
    document.getElementById('photoPreview').classList.add('show');
  };
  reader.readAsDataURL(file);
});

document.getElementById('reportForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const result = document.getElementById('result');

  const reporterName = document.getElementById('reporterName').value.trim();
  const reporterRole = document.getElementById('reporterRole').value.trim();
  const reporterContact = document.getElementById('reporterContact').value.trim();
  const floor = document.getElementById('floor').value.trim();
  const roomZone = document.getElementById('roomZone').value.trim();
  const description = document.getElementById('description').value.trim();

  btn.disabled = true;
  btn.textContent = 'Submitting…';
  result.className = 'result';

  try {
    const resp = await fetch('/api/report-issue', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        reporterName, reporterRole, reporterContact, floor, roomZone, description,
        photoBase64, photoFilename, photoContentType,
      }),
    });
    const data = await resp.json();

    if (resp.ok && data.success) {
      result.className = 'result success show';
      result.textContent = data.message || 'Report submitted. The maintenance team has been notified.';
      document.getElementById('reportForm').reset();
      document.getElementById('photoPreview').classList.remove('show');
      photoBase64 = null; photoFilename = null; photoContentType = null;
    } else {
      result.className = 'result error show';
      result.textContent = data.error || 'Something went wrong. Please try again.';
    }
  } catch (err) {
    result.className = 'result error show';
    result.textContent = 'Network error: ' + err.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Submit Report';
  }
});
</script>
</body>
</html>
