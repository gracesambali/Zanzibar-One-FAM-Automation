<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report a Breakdown — GVC Facility Asset Manager</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, 'Segoe UI', Arial, sans-serif; background:#F0F2F6; color:#1A1A2E; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .card { background:#fff; border-radius:16px; max-width:440px; width:100%; padding:32px 28px; box-shadow:0 4px 24px rgba(0,0,0,.08); }
  .logo-row { display:flex; align-items:center; gap:12px; margin-bottom:6px; }
  .logo { width:44px; height:44px; border-radius:50%; overflow:hidden; flex-shrink:0; }
  .logo img { width:100%; height:100%; object-fit:contain; }
  h1 { font-size:17px; color:#1A3566; }
  .sub { font-size:12.5px; color:#6B7280; margin-top:2px; margin-bottom:8px; }
  label { font-size:12px; font-weight:600; color:#1A3566; display:block; margin-bottom:6px; margin-top:16px; }
  input, textarea { width:100%; padding:11px 14px; border:1px solid #E2E6ED; border-radius:8px; font-size:14px; font-family:inherit; }
  textarea { resize:vertical; min-height:80px; }
  button { width:100%; margin-top:22px; padding:14px; border:none; border-radius:10px; background:#1A3566; color:#fff; font-size:15px; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.6; cursor:wait; }
  .asset-confirm { margin-top:6px; padding:10px 12px; border-radius:8px; font-size:12.5px; display:none; }
  .asset-confirm.found { background:#E8F8EF; color:#065F46; display:block; }
  .asset-confirm.notfound { background:#FDE8E6; color:#991B1B; display:block; }
  .result { margin-top:18px; padding:14px; border-radius:10px; font-size:13.5px; line-height:1.6; display:none; }
  .result.show { display:block; }
  .result.success { background:#E8F8EF; color:#065F46; }
  .result.error { background:#FDE8E6; color:#991B1B; }
  .footer { text-align:center; font-size:11px; color:#9CA3AF; margin-top:22px; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <div class="logo"><img src="/logo.png" alt="GVC"></div>
      <div>
        <h1>Report a Breakdown</h1>
      </div>
    </div>
    <div class="sub">No login needed — the technical team is notified the moment you submit.</div>

    <form id="reportForm">
      <label for="assetId">Asset ID</label>
      <input id="assetId" type="text" placeholder="e.g. FP-002 — check the tag on the equipment" required>
      <div id="assetConfirm" class="asset-confirm"></div>

      <label for="reporterName">Your Name</label>
      <input id="reporterName" type="text" required>

      <label for="reporterRole">Your Role / Department (optional)</label>
      <input id="reporterRole" type="text" placeholder="e.g. Ward Nurse, Procurement">

      <label for="description">What's wrong?</label>
      <textarea id="description" placeholder="Describe what you're seeing — noise, leak, not working, etc." required></textarea>

      <button type="submit" id="submitBtn">Submit Report</button>
    </form>

    <div id="result" class="result"></div>

    <div class="footer">Gracing Ventures · BIM Information Management · Tanzania</div>
  </div>

<script>
// If a QR code or link included ?asset=FP-002, pre-fill and lock it in
const params = new URLSearchParams(window.location.search);
const prefilledAsset = params.get('asset');
if (prefilledAsset) {
  document.getElementById('assetId').value = prefilledAsset;
  checkAsset(prefilledAsset);
}

let assetConfirmed = false;

document.getElementById('assetId').addEventListener('blur', (e) => {
  const val = e.target.value.trim();
  if (val) checkAsset(val);
});

async function checkAsset(assetId) {
  const confirmBox = document.getElementById('assetConfirm');
  confirmBox.className = 'asset-confirm';
  try {
    const resp = await fetch('/api/report-issue?assetId=' + encodeURIComponent(assetId));
    const data = await resp.json();
    if (resp.ok) {
      confirmBox.textContent = `✓ ${data.name} — ${data.location}`;
      confirmBox.className = 'asset-confirm found';
      assetConfirmed = true;
    } else {
      confirmBox.textContent = '✗ ' + (data.error || 'Asset not found — check the ID and try again');
      confirmBox.className = 'asset-confirm notfound';
      assetConfirmed = false;
    }
  } catch (err) {
    assetConfirmed = false;
  }
}

document.getElementById('reportForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const result = document.getElementById('result');

  const assetId = document.getElementById('assetId').value.trim();
  const reporterName = document.getElementById('reporterName').value.trim();
  const reporterRole = document.getElementById('reporterRole').value.trim();
  const description = document.getElementById('description').value.trim();

  btn.disabled = true;
  btn.textContent = 'Submitting…';
  result.className = 'result';

  try {
    const resp = await fetch('/api/report-issue', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ assetId, reporterName, reporterRole, description }),
    });
    const data = await resp.json();

    if (resp.ok && data.success) {
      result.className = 'result success show';
      result.textContent = data.message || 'Report submitted. The technical team has been notified.';
      document.getElementById('reportForm').reset();
      document.getElementById('assetConfirm').className = 'asset-confirm';
    } else {
      result.className = 'result error show';
      result.textContent = data.error || 'Something went wrong. Please try again.';
    }
  } catch (err) {
    result.className = 'result error show';
    result.textContent = 'Network error: ' + err.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Submit Report';
  }
});
</script>
</body>
</html>
